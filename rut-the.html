<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rút Thẻ · Hành Trình 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Barlow:wght@400;500;600;700&family=Bebas+Neue&family=Big+Shoulders+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0a0503;
    --ember-deep:#2c0904;
    --ember:#e8380d;
    --flame:#ff8a1e;
    --gold:#f4d35e;
    --gold-dim:#b8862f;
    --steel:#d7dbe0;
    --steel-dim:#7d838c;
    --iron:#1a1512;
    --text-light:#f2ece0;
    --text-muted:#a99b8c;
    --card-ratio: 1635 / 2048;
    /* Kích thước khung thẻ khi xáo/trải/trộn — bằng đúng khung thẻ dùng ở
       index.html / cong-dien-hoi-ngo.html (--card-w: clamp(118px, 27vw, 55mm)),
       có thêm giới hạn theo vh để không chồng lấn tiêu đề/nút ở màn hình thấp/ngang. */
    --deck-card-w: clamp(100px, min(27vw, 34vh), 55mm);
    --card-w: clamp(200px, min(58vw, 62vh), 400px);
    --radius-deck: 3mm;
    --radius: 4mm;
    --card-depth: 10px;
    /* Ảnh mặt sau thẻ — thay đường dẫn này bằng ảnh mặt sau của bạn */
    --back-card-img: url('images/mat-sau.png');
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    height:100%;
    overflow:hidden;
    font-family:'Barlow', 'Source Sans 3', sans-serif;
    color:var(--text-light);
  }
  html{ background:var(--void); }
  body{
    background:
      radial-gradient(ellipse 900px 700px at 50% 8%, rgba(232,56,13,0.28), transparent 60%),
      radial-gradient(ellipse 1200px 900px at 15% 100%, rgba(255,138,30,0.14), transparent 55%),
      radial-gradient(ellipse 1200px 900px at 85% 100%, rgba(232,56,13,0.12), transparent 55%),
      linear-gradient(180deg, #170604 0%, var(--void) 45%, #050202 100%);
    position:relative;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .streak{
    position:fixed; top:0; bottom:0; width:2px;
    background:linear-gradient(180deg, transparent, rgba(255,138,30,0.5), transparent);
    filter: blur(1px);
    pointer-events:none;
    z-index:0;
  }
  .streak.s1{ left:8%; opacity:0.5; transform:rotate(14deg);}
  .streak.s2{ left:88%; opacity:0.35; transform:rotate(-14deg);}
  .streak.s3{ left:50%; opacity:0.2; transform:rotate(8deg);}

  /* ---------- Top bar ---------- */
  .top-bar{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    padding: max(16px, env(safe-area-inset-top)) 20px 16px;
    z-index:20;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--btn-bg, rgba(10,5,3,0.4));
    backdrop-filter: blur(6px);
    border:1px solid var(--btn-border, rgba(244,211,94,0.4));
    color: var(--btn-text, var(--gold));
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:9px 16px;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    transition: all 0.25s ease, background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
  }
  .back-btn:hover{
    background: var(--btn-bg-hover, rgba(232,56,13,0.18));
    border-color: var(--flame);
    color: var(--flame);
  }
  .back-btn.is-light{
    --btn-bg: rgba(10,5,3,0.55);
    --btn-border: rgba(10,5,3,0.55);
    --btn-text: #f7f1e4;
    --btn-bg-hover: rgba(10,5,3,0.72);
  }
  .back-btn.is-dark{
    --btn-bg: rgba(10,5,3,0.4);
    --btn-border: rgba(244,211,94,0.45);
    --btn-text: var(--gold);
    --btn-bg-hover: rgba(232,56,13,0.18);
  }
  .top-right{
    display:flex;
    align-items:flex-start;
    gap:10px;
  }
  .redraw-btn{
    display:none;
    position:fixed;
    left:20px;
    bottom: max(20px, calc(env(safe-area-inset-bottom) + 20px));
    z-index:20;
  }
  body.phase-reveal .redraw-btn{ display:inline-flex; }

  .label{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    line-height:1.5;
  }
  .label .num{
    order:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    max-width: min(60vw, 420px);
    font-family:'Anton', 'Big Shoulders Display', sans-serif;
    font-size:11px;
    line-height:1;
    color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    padding:5px 9px 4px;
    border-radius:3px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .label .title{
    order:2;
    display:block;
    margin-top:0;
    font-family:'Anton', 'Big Shoulders Display', 'Playfair Display', sans-serif;
    font-weight:400;
    font-size:19px;
    color: var(--label-text, var(--text-light));
    letter-spacing:0.02em;
    text-transform:uppercase;
    text-shadow: var(--label-shadow, 0 2px 10px rgba(0,0,0,0.75));
    transition: color 0.4s ease, text-shadow 0.4s ease;
  }
  .label.is-light .title{
    --label-text:#171310;
    --label-shadow: 0 1px 6px rgba(255,255,255,0.7), 0 0 14px rgba(255,255,255,0.4);
  }
  .label.is-dark .title{
    --label-text: var(--text-light);
    --label-shadow: 0 2px 10px rgba(0,0,0,0.75);
  }
  body:not(.phase-reveal) .label{ display:none; }

  /* ---------- Header (chỉ hiện khi đang xáo thẻ) ---------- */
  .header{
    position:fixed;
    top: max(48px, calc(env(safe-area-inset-top) + 48px));
    left:0; right:0;
    text-align:center;
    z-index:5;
    padding:0 24px;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--flame);
    margin-bottom:10px;
  }
  h1{
    font-family:'Anton', 'Big Shoulders Display', 'Playfair Display', sans-serif;
    font-weight:400;
    font-size:clamp(30px, 6vw, 50px);
    margin:0 0 10px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    line-height:1.3;
    padding:0.1em 0;
    background: linear-gradient(180deg, #ffffff 0%, var(--steel) 35%, var(--gold) 75%, var(--flame) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter: drop-shadow(0 2px 18px rgba(232,56,13,0.45));
  }
  .sub{
    color:var(--text-muted);
    font-size:12px;
    letter-spacing:0.05em;
    max-width:520px;
    margin:0 auto;
    line-height:1.6;
  }
  .sub strong{
    color:var(--gold);
    font-family:'Anton', 'Big Shoulders Display', sans-serif;
    font-size:14px;
    letter-spacing:0.04em;
  }
  body.phase-reveal .header{
    opacity:0;
    transform: translateY(-14px);
    pointer-events:none;
  }

  /* ---------- Sân khấu xáo thẻ ---------- */
  .shuffle-zone{
    position:fixed; inset:0;
    z-index:2;
    transition: opacity 0.35s ease;
  }
  body.phase-reveal .shuffle-zone{
    opacity:0;
    pointer-events:none;
    visibility:hidden;
  }
  .deck-stage{
    position:absolute;
    left:50%; top:50%;
    width:1px; height:1px;
    transform: translate(-50%, -46%);
  }

  .shuffle-card{
    position:absolute;
    top:0; left:0;
    width:var(--deck-card-w);
    aspect-ratio: var(--card-ratio);
    transform: translate(-50%,-50%) translate(var(--tx,0px), var(--ty,0px)) rotate(var(--rot,0deg)) scale(var(--sc,1));
    transition: transform 0.85s cubic-bezier(.22,.85,.3,1), opacity 0.55s ease;
    opacity:1;
    perspective: 1200px;
    will-change: transform;
  }
  .sc-wobble{
    width:100%;
    height:100%;
    animation: scWobble var(--wob-dur, 2.6s) ease-in-out infinite;
    animation-delay: var(--wob-delay, 0s);
  }
  @keyframes scWobble{
    0%,100%{ transform: rotate(0deg) translateY(0); }
    50%{ transform: rotate(1.1deg) translateY(-1.5px); }
  }
  /* Khối lật thẻ (mặt sau -> mặt trước) dùng cho thẻ trúng thưởng khi rút */
  .sc-flip{
    position:relative;
    width:100%; height:100%;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(.4,.08,.2,1);
  }
  .sc-flip.is-flipped{ transform: rotateY(180deg); }
  .sc-face{
    position:relative;
    width:100%; height:100%;
    border-radius: var(--radius-deck);
    padding:3px;
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.55),
      0 10px 22px -8px rgba(0,0,0,0.75),
      0 0 18px rgba(232,56,13,0.32);
  }
  .sc-flip-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }
  .sc-flip-front{ transform: rotateY(180deg); }
  .sc-inner{
    width:100%; height:100%;
    border-radius: calc(var(--radius-deck) - 1.4px);
    background: var(--iron);
    position:relative;
    overflow:hidden;
  }
  /* Ảnh mặt sau thẻ — mặc định lấy từ biến --back-card-img ở :root,
     tự thay đường dẫn ảnh của bạn ở đó (hoặc gán trực tiếp background-image ở đây). */
  .sc-art{
    position:absolute; inset:0;
    background-image: var(--back-card-img);
    background-size:cover;
    background-position:center;
  }
  /* Mặt trước — ảnh thẻ thật, được gán bằng JS đúng lúc lật khi rút trúng */
  .sc-art-front{
    background-image:none;
    background-size:cover;
    background-position:center;
    background-color: var(--iron);
  }
  .sc-inner::before{
    content:"";
    position:absolute; inset:0;
    border:1px solid rgba(244,211,94,0.45);
    border-radius: calc(var(--radius-deck) - 1.4px);
    pointer-events:none;
  }


  .draw-btn{
    position:fixed;
    left:50%; bottom: max(38px, calc(env(safe-area-inset-bottom) + 38px));
    transform: translateX(-50%);
    z-index:6;
    font-family:'Anton', 'Big Shoulders Display', sans-serif;
    font-weight:400;
    font-size:17px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    border:none;
    padding:15px 42px;
    border-radius:40px;
    cursor:pointer;
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.5),
      0 10px 26px -6px rgba(232,56,13,0.6),
      0 0 34px rgba(255,138,30,0.4);
    transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.3s ease;
  }
  .draw-btn:hover{
    transform: translateX(-50%) translateY(-3px) scale(1.03);
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.75),
      0 14px 32px -6px rgba(232,56,13,0.75),
      0 0 46px rgba(255,138,30,0.55);
  }
  .draw-btn:active{ transform: translateX(-50%) translateY(0) scale(0.97); }
  .draw-btn:disabled{
    opacity:0.55;
    cursor:default;
    transform: translateX(-50%);
  }
  body.phase-reveal .draw-btn{
    opacity:0;
    pointer-events:none;
  }

  /* ---------- Flash toàn màn hình khi chuyển pha ---------- */
  .screen-flash{
    position:fixed; inset:0;
    z-index:15;
    pointer-events:none;
    background: radial-gradient(circle at 50% 55%, rgba(255,230,180,0.95), rgba(255,138,30,0.55) 40%, transparent 72%);
    opacity:0;
    mix-blend-mode: screen;
  }
  .screen-flash.active{
    animation: screenFlashPop 0.55s ease-out;
  }
  @keyframes screenFlashPop{
    0%{ opacity:0; }
    25%{ opacity:1; }
    100%{ opacity:0; }
  }

  /* ================= REVEAL (copy nguyên hiệu ứng từ xem-the.html) ================= */
  .reveal-zone{ display:none; }
  body.phase-reveal .reveal-zone{ display:block; }

  .bg-crop{ position:fixed; inset:0; overflow:hidden; z-index:-2; }
  .bg-img{
    position:absolute; inset:-60px;
    background-size:cover; background-position:center;
    filter: blur(22px) saturate(1.3) brightness(1.15);
    transform: scale(1.12);
  }
  .bg-overlay{
    position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(ellipse 900px 700px at 50% 0%, rgba(232,56,13,0.1), transparent 62%),
      radial-gradient(ellipse 1000px 900px at 100% 100%, rgba(0,0,0,0.14), transparent 60%),
      linear-gradient(180deg, rgba(10,5,3,0.05) 0%, rgba(5,2,1,0.16) 60%, rgba(5,2,1,0.26) 100%);
  }

  .stage{
    position:fixed; inset:0;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective: 1000px;
    touch-action:none;
  }
  .stage.awaiting-flip{ cursor:pointer; }
  .stage.awaiting-flip .card-wrap{ cursor:pointer; }
  /* Các hiệu ứng loé sáng/sốc/tàn lửa/toả tia chỉ nên chạy sau khi người
     dùng bấm lật thẻ — khoá chúng lại trong lúc còn đang chờ lật. */
  body.awaiting-flip .reveal-flash,
  body.awaiting-flip .shockwave,
  body.awaiting-flip .ember,
  body.awaiting-flip .reveal-burst,
  body.awaiting-flip .reveal-burst::before{
    animation: none;
    opacity:0;
  }

  .card-wrap{
    position:relative;
    width:var(--card-w);
    aspect-ratio: var(--card-ratio);
    animation: introDrop 1.05s cubic-bezier(.22,.85,.3,1) both;
    filter:
      drop-shadow(0 8px 10px rgba(0,0,0,0.55))
      drop-shadow(0 35px 50px rgba(0,0,0,0.65));
  }
  @keyframes introDrop{
    0%{ opacity:0; transform: translateY(-46px) scale(0.82) rotateZ(-4deg); }
    55%{ opacity:1; transform: translateY(3px) scale(1.045) rotateZ(1.5deg); }
    78%{ transform: translateY(-1px) scale(0.985) rotateZ(-0.5deg); }
    100%{ opacity:1; transform: translateY(0) scale(1) rotateZ(0deg); }
  }
  .reveal-flash{
    position:absolute; inset:0;
    border-radius: var(--radius);
    background: radial-gradient(circle at 50% 62%,
      rgba(255,200,110,0.95) 0%,
      rgba(255,138,30,0.7) 26%,
      rgba(232,56,13,0.45) 46%,
      rgba(244,211,94,0.15) 62%,
      transparent 76%);
    opacity:0;
    pointer-events:none;
    animation: revealFlash 1.25s ease-out 0.5s both;
    mix-blend-mode: screen;
    z-index:3;
  }
  @keyframes revealFlash{
    0%{ opacity:0; transform:scale(0.5); filter:brightness(1.3) saturate(1.1); }
    28%{ opacity:1; transform:scale(1.08); filter:brightness(1.7) saturate(1.3); }
    100%{ opacity:0; transform:scale(1.5); filter:brightness(1) saturate(1); }
  }
  .shockwave{
    position:absolute; inset:-8%;
    border-radius: var(--radius);
    border: 3px solid rgba(255,180,90,0.85);
    box-shadow:
      0 0 24px 6px rgba(255,138,30,0.55),
      inset 0 0 20px 4px rgba(255,138,30,0.35);
    opacity:0;
    pointer-events:none;
    animation: shockwaveExpand 0.85s ease-out 0.55s both;
    z-index:2;
  }
  @keyframes shockwaveExpand{
    0%{ opacity:0.95; transform:scale(0.65); }
    65%{ opacity:0.4; }
    100%{ opacity:0; transform:scale(1.7); }
  }
  .ember{
    position:absolute;
    bottom:8%;
    width:5px; height:5px;
    border-radius:50%;
    background: radial-gradient(circle, var(--gold) 0%, var(--flame) 55%, transparent 78%);
    box-shadow: 0 0 6px 1px rgba(255,138,30,0.8);
    opacity:0;
    animation: emberRise 1.3s ease-out both;
    pointer-events:none;
  }
  .ember.big{
    width:8px; height:8px;
    box-shadow: 0 0 10px 2px rgba(255,138,30,0.85);
  }
  @keyframes emberRise{
    0%{ opacity:0; transform: translate(0,0) scale(0.6); }
    16%{ opacity:1; }
    70%{ opacity:0.8; }
    100%{ opacity:0; transform: translate(var(--drift, 0px), -150px) scale(0.15); }
  }
  .reveal-burst{
    position:fixed; inset:0;
    z-index:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    opacity:0;
    animation: burstFade 0.95s ease-out 0.45s both;
  }
  .reveal-burst::before{
    content:'';
    width:150vmax; height:150vmax;
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,138,30,0.55) 4deg, transparent 10deg,
      transparent 28deg, rgba(244,211,94,0.4) 32deg, transparent 38deg,
      transparent 55deg, rgba(232,56,13,0.5) 59deg, transparent 65deg,
      transparent 85deg, rgba(255,138,30,0.55) 89deg, transparent 95deg,
      transparent 112deg, rgba(244,211,94,0.4) 116deg, transparent 122deg,
      transparent 140deg, rgba(232,56,13,0.5) 144deg, transparent 150deg,
      transparent 170deg, rgba(255,138,30,0.55) 174deg, transparent 180deg,
      transparent 198deg, rgba(244,211,94,0.4) 202deg, transparent 208deg,
      transparent 225deg, rgba(232,56,13,0.5) 229deg, transparent 235deg,
      transparent 255deg, rgba(255,138,30,0.55) 259deg, transparent 265deg,
      transparent 282deg, rgba(244,211,94,0.4) 286deg, transparent 292deg,
      transparent 310deg, rgba(232,56,13,0.5) 314deg, transparent 320deg,
      transparent 340deg, rgba(255,138,30,0.55) 344deg, transparent 350deg,
      transparent 360deg);
    animation: burstSpin 0.95s cubic-bezier(.15,.7,.3,1) both;
  }
  @keyframes burstFade{
    0%{ opacity:0; } 18%{ opacity:1; } 100%{ opacity:0; }
  }
  @keyframes burstSpin{
    0%{ transform: scale(0.04) rotate(0deg); }
    100%{ transform: scale(1) rotate(28deg); }
  }

  .card-inner{ position:relative; width:100%; height:100%; transform-style:preserve-3d; will-change:transform; }
  .card-shadow{
    position:absolute; left:6%; right:6%; bottom:-9%; height:16%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.72), transparent 72%);
    filter: blur(16px);
    transform: translateZ(-40px);
    pointer-events:none;
  }
  .card-face{
    position:relative; width:100%; height:100%;
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--iron);
    padding:4px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2));
    box-shadow:
      0 0 0 2px rgba(244,211,94,0.8),
      0 0 0 3.5px rgba(10,5,3,0.55),
      0 0 44px rgba(232,56,13,0.4),
      0 22px 44px -14px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 3px rgba(0,0,0,0.35),
      inset 2px 0 3px rgba(255,255,255,0.15),
      inset -2px 0 3px rgba(0,0,0,0.25);
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
  }
  .card-art{ width:100%; height:100%; border-radius: calc(var(--radius) - 2px); overflow:hidden; position:relative; background: var(--iron); }
  .card-art .art{ position:absolute; inset:0; background-size:cover; background-repeat:no-repeat; background-position:center; }

  .holo-sheen{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background:
      repeating-linear-gradient(115deg, rgba(255,46,151,0.5) 0%, rgba(255,196,0,0.5) 9%, rgba(84,255,196,0.5) 18%, rgba(63,150,255,0.5) 27%, rgba(198,63,255,0.5) 36%, rgba(255,46,151,0.5) 45%),
      repeating-linear-gradient(25deg, transparent 0%, rgba(255,255,255,0.09) 3%, transparent 6%);
    background-size:260% 260%, 34% 34%;
    mix-blend-mode: screen;
    opacity:0.3;
    pointer-events:none;
  }
  .holo-glare{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background: radial-gradient(circle at var(--gx,50%) var(--gy,50%), rgba(255,255,255,0.95) 0%, rgba(255,222,244,0.55) 6%, rgba(190,222,255,0.28) 15%, transparent 34%);
    mix-blend-mode: overlay;
    opacity:0;
    pointer-events:none;
  }
  .holo-edge{
    position:absolute; inset:0;
    border-radius: var(--radius);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35);
    opacity: var(--edge-op, 0);
    pointer-events:none;
    mix-blend-mode:overlay;
  }
  .card-grain{
    position:absolute; inset:0;
    border-radius: calc(var(--radius) - 1px);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    opacity:0.05;
    mix-blend-mode: overlay;
    pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .card-back{
    position:absolute; inset:0;
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--iron);
    padding:4px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    /* Không còn lật 180deg — mặt sau giờ là 1 lớp phủ phẳng nằm TRÊN
       mặt trước (translateZ lớn hơn), sẽ bị "đốt cháy" (mask) dần để
       lộ mặt trước bên dưới thay vì xoay 3D. */
    transform: translateZ(calc(var(--card-depth) / 2 + 6px));
    transition: opacity 0.5s ease 0.15s;
    box-shadow:
      0 0 0 2px rgba(244,211,94,0.8),
      0 0 0 3.5px rgba(10,5,3,0.55),
      0 0 44px rgba(232,56,13,0.4),
      0 22px 44px -14px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 3px rgba(0,0,0,0.35),
      inset 2px 0 3px rgba(255,255,255,0.15),
      inset -2px 0 3px rgba(0,0,0,0.25);
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
    pointer-events:none;
  }
  .card-back-art{
    width:100%; height:100%;
    border-radius: calc(var(--radius) - 2px);
    overflow:hidden;
    background-image: var(--back-card-img);
    background-size:cover;
    background-position:center;
    background-color: var(--iron);
  }
  /* Lớp lửa cháy lan (dải sáng cam-đỏ bám theo đúng mép đang đốt) */
  /* Vết than cháy — KHÔNG biến mất, nằm sát mép trong của vùng đã cháy qua,
     mô phỏng viền giấy hoá than: đen nhám, hơi nâu cháy, có vệt xém loang lổ
     đậm nhạt (không phải màu đen phẳng) và mép răng cưa nhọn (giấy cháy xé,
     không cong tròn mượt). Đây là lớp "vết tích để lại", khác với .burn-flame
     là dải sáng đang di chuyển. */
  .burn-char{
    position:absolute; inset:0;
    border-radius: var(--radius);
    overflow:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 7px));
    pointer-events:none;
    opacity:0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(80,38,16,0.55), transparent 50%),
      radial-gradient(ellipse at 72% 78%, rgba(56,24,10,0.5), transparent 48%),
      radial-gradient(ellipse at 50% 50%, rgba(40,18,8,0.4), transparent 60%),
      #0c0603;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='c'><feTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.25  0 0 0 0 0.12  0 0 0 0 0.04  0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23c)'/></svg>"),
      radial-gradient(ellipse at 28% 22%, rgba(80,38,16,0.55), transparent 50%),
      radial-gradient(ellipse at 72% 78%, rgba(56,24,10,0.5), transparent 48%),
      radial-gradient(ellipse at 50% 50%, rgba(40,18,8,0.4), transparent 60%),
      #0c0603;
    background-blend-mode: overlay, normal, normal, normal, normal;
    transition: opacity 0.2s ease;
  }
  .burn-char.active{ opacity:1; }
  /* Viền mép quăn: 1 dải tối hẹp bám sát ngay trong mép lửa, tạo cảm
     giác giấy hơi cong vênh lên và đổ bóng xuống phần than bên dưới,
     thay vì mép cháy là 1 lát cắt phẳng lì. */
  .burn-curl{
    position:absolute; inset:0;
    border-radius: var(--radius);
    overflow:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 7.5px));
    pointer-events:none;
    opacity:0;
    mix-blend-mode: multiply;
    background: rgba(0,0,0,0.55);
    filter: blur(1.5px);
    transition: opacity 0.2s ease;
  }
  .burn-curl.active{ opacity:1; }
  .burn-flame{
    position:absolute; inset:0;
    border-radius: var(--radius);
    overflow:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 8px));
    pointer-events:none;
    mix-blend-mode: screen;
    opacity:0;
    filter: blur(0.6px);
    transition: opacity 0.25s ease;
  }
  .burn-flame.active{ opacity:1; }
  /* (Đã bỏ lớp .burn-char phủ texture riêng — gây cảm giác giả vì là 1
     lớp hoạ tiết tách rời đè lên trên, không gắn liền với hình dạng mép
     cháy thật. Thay vào đó, màu than/cháy được vẽ ngay trong gradient
     của chính .burn-flame — mảnh, bám sát viền — và độ lởm chởm của mép
     đến từ chính clip-path (nhiều tần số nhiễu hơn) thay vì texture giả
     chồng lên trên.) */
  /* Lớp chứa tàn lửa/hạt lửa bắn ra dọc theo mép lửa đang lan */
  .burn-ember-layer{
    position:absolute; inset:0;
    overflow:hidden;
    border-radius: var(--radius);
    transform: translateZ(calc(var(--card-depth) / 2 + 9px));
    pointer-events:none;
  }
  .card-side{ position:absolute; background-image: linear-gradient(90deg, #d7dbe0 0%, #8a8f96 35%, #f4ecd6 55%, #8a8f96 80%, #d7dbe0 100%); filter: brightness(0.5); pointer-events:none; }
  /* ---------- Tàn lửa bay tụ vào 1 điểm trên thẻ trước khi bén lửa ----------
     Đặt trực tiếp trên toàn màn hình (position:fixed, không nằm trong khối
     3D của thẻ) để tàn lửa có thể bay từ ngoài rìa màn hình hội tụ vào,
     tạo nhịp "chờ đợi - dồn lại - bùng cháy" thay vì lửa bắt đầu ngay tức
     khắc như trước. */
  .ember-converge-layer{
    position:fixed; inset:0;
    z-index:8;
    pointer-events:none;
  }
  .spark-converge{
    position:fixed;
    width:4px; height:4px;
    margin:-2px 0 0 -2px;
    border-radius:50%;
    background: radial-gradient(circle, #fff6dd 0%, var(--gold) 45%, var(--flame) 75%, transparent 100%);
    box-shadow: 0 0 7px 2px rgba(255,154,30,0.75), 0 0 14px 4px rgba(232,56,13,0.35);
    opacity:0;
    transition: opacity 0.15s ease;
    pointer-events:none;
  }
  .spark-converge.big{ width:6px; height:6px; margin:-3px 0 0 -3px; box-shadow: 0 0 10px 3px rgba(255,154,30,0.85), 0 0 20px 6px rgba(232,56,13,0.4); }
  .spark-converge.visible{ opacity:1; }
  /* Điểm loé sáng bùng lên đúng lúc tàn lửa hội tụ đủ và bén thành lửa —
     đánh dấu khoảnh khắc chuyển từ "chờ đợi" sang "bùng cháy". */
  .ignite-flash{
    position:fixed;
    width:14px; height:14px;
    margin:-7px 0 0 -7px;
    border-radius:50%;
    background: radial-gradient(circle, #fff8e6 0%, #ffe19a 30%, #ff9a3d 55%, #e8380d 74%, transparent 82%);
    opacity:0;
    pointer-events:none;
    z-index:9;
  }
  @keyframes igniteFlashPop{
    0%{ opacity:0; transform:scale(0.15); }
    22%{ opacity:1; transform:scale(3.6); }
    100%{ opacity:0; transform:scale(11); }
  }
  .ignite-flash.active{ animation: igniteFlashPop 0.55s cubic-bezier(.2,.8,.3,1) both; }
  .side-right, .side-left{ top:0; width: var(--card-depth); height:100%; }
  .side-top, .side-bottom{ left:0; height: var(--card-depth); width:100%; }
  .side-right{ left: calc(100% - var(--card-depth) / 2); transform: rotateY(90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-left{ left: calc(var(--card-depth) / -2); transform: rotateY(-90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-top{ top: calc(var(--card-depth) / -2); transform: rotateX(-90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-bottom{ top: calc(100% - var(--card-depth) / 2); transform: rotateX(90deg) translateZ(calc(var(--card-depth) / 2)); }
  .shine-sweep{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background: linear-gradient(75deg, transparent 32%, rgba(255,255,255,0.5) 46%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.5) 54%, transparent 68%);
    background-size:240% 240%;
    mix-blend-mode: overlay;
    opacity:0.6;
    pointer-events:none;
  }

  .hint{
    position:fixed; left:0; right:0;
    bottom: max(22px, env(safe-area-inset-bottom));
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    z-index:5;
    animation: hintFade 5s ease forwards;
    pointer-events:none;
  }
  @keyframes hintFade{ 0%{opacity:0;} 15%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;} }

  .sparkle-layer{
    position:absolute; inset:0;
    border-radius: calc(var(--radius) - 1px);
    overflow:hidden;
    pointer-events:none;
    transform: translateZ(calc(var(--card-depth) / 2 + 3px));
  }
  .sparkle{
    position:absolute; width:6px; height:6px; margin:-3px 0 0 -3px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.7) 45%, transparent 72%);
    border-radius:50%;
    opacity:0;
    animation: sparklePop 850ms ease-out forwards;
  }
  @keyframes sparklePop{
    0%{ opacity:0; transform:scale(0.2); }
    30%{ opacity:1; transform:scale(1.4); }
    100%{ opacity:0; transform:scale(0.3); }
  }

  .action-bar{
    position:fixed; right:20px;
    bottom: max(78px, calc(env(safe-area-inset-bottom) + 78px));
    display:flex; flex-direction:column; gap:10px;
    z-index:10;
  }
  .icon-btn{
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(10,5,3,0.45);
    backdrop-filter: blur(6px);

    transition: all 0.25s ease;

  .icon-btn:hover{ background: rgba(232,56,13,0.18); border-color: var(--flame); color: var(--flame); }
  .icon-btn[aria-pressed="true"]{ color: var(--flame); border-color: var(--flame); background: rgba(232,56,13,0.22); }

  @media (max-width:560px){
    .label{ display:none; }
    .header{ top: max(66px, calc(env(safe-area-inset-top) + 66px)); }
  }
</style>

// Quét 1 trang công diễn đã tải về: tìm mọi thẻ (.slot .art) có sẵn
// background-image (tức đã gắn ảnh thật), gắn với số mục (.collection-num)
// của khối .muc-block chứa nó, cùng tên trang nguồn (source) để hiện ở badge.
function extractCardsFromDoc(doc, source){
  const found = [];
  doc.querySelectorAll('.muc-block').forEach(block => {
    const numEl = block.querySelector('.collection-num');
    const muc = numEl ? parseInt(numEl.textContent, 10) : null;
    if(!muc) return;
    block.querySelectorAll('.slot .art').forEach(art => {
      const bg = art.getAttribute('style') || '';
      const match = bg.match(/url\((?:"|')?(.*?)(?:"|')?\)/);
      const src = match && match[1] ? match[1].trim() : '';
      if(src) found.push({ muc, img: src, source });
    });
  });
  return found;
}

async function fetchCardsFromPage(url){
  try{
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) return [];
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    return extractCardsFromDoc(doc, PAGE_TITLES[url] || url);
  }catch(err){
    return [];
  }
}

async function buildCardsPool(){
  const perPage = await Promise.all(SOURCE_PAGES.map(fetchCardsFromPage));
  const merged = perPage.flat();
  return merged.length ? merged : FALLBACK_CARDS;
}

function withTimeout(promise, ms, fallbackValue){
  return Promise.race([
    promise,
    new Promise(resolve => setTimeout(() => resolve(fallbackValue), ms))
  ]);
}

// Chỉ quét 1 lần rồi lưu lại cho các lượt rút thẻ tiếp theo (đỡ tải mạng lặp lại).
let cardsPoolPromise = null;
function getCardsPool(){
  if(!cardsPoolPromise) cardsPoolPromise = buildCardsPool();
  return withTimeout(cardsPoolPromise, 4000, FALLBACK_CARDS);
}

   ================================================================== */
const N_DECK = 14;
const deckStage = document.getElementById('deckStage');
const shuffleEls = [];

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }
function rand(min, max){ return min + Math.random() * (max - min); }
function shuffleArrayInPlace(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Đo kích thước thẻ thật đang render (theo --deck-card-w) để mọi khoảng cách
// xáo/trải/trộn tự co giãn đúng tỉ lệ, dù bạn đổi kích thước khung thẻ.
let cardWidth = 140;
function measureCardWidth(){
  if(!shuffleEls.length) return;
  const rect = shuffleEls[0].getBoundingClientRect();
  if(rect.width) cardWidth = rect.width;
}

for(let i = 0; i < N_DECK; i++){
  const card = document.createElement('div');
  card.className = 'shuffle-card';
  card.style.setProperty('--tx', '0px');
  card.style.setProperty('--ty', (-i * 1.1) + 'px');
  card.style.setProperty('--rot', (rand(-2,2)) + 'deg');
  card.style.zIndex = N_DECK - i;
  card.innerHTML = `
    <div class="sc-wobble" style="--wob-dur:${rand(2.2,3.4)}s; --wob-delay:${rand(0,3)}s;">
      <div class="sc-flip">
        <div class="sc-face sc-flip-face sc-flip-back">
          <div class="sc-inner">
            <div class="sc-art"></div>
          </div>
        </div>
        <div class="sc-face sc-flip-face sc-flip-front">
          <div class="sc-inner">
            <div class="sc-art sc-art-front"></div>
          </div>
        </div>
      </div>
    </div>`;
  deckStage.appendChild(card);
  shuffleEls.push(card);
}
measureCardWidth();
window.addEventListener('resize', () => {
  measureCardWidth();
  if(currentLayoutIsFan) layoutFan(currentOrder);
});

function setXform(el, tx, ty, rot, sc){
  el.style.setProperty('--tx', tx.toFixed(1) + 'px');
  el.style.setProperty('--ty', ty.toFixed(1) + 'px');
  el.style.setProperty('--rot', rot.toFixed(1) + 'deg');
  el.style.setProperty('--sc', sc.toFixed(3));
}

// "Xáo": chồng thành cọc thẻ gọn, hơi lệch ngẫu nhiên như đang được xóc
function layoutStack(order){
  currentLayoutIsFan = false;
  const jitter = cardWidth * 0.018;
  order.forEach((el, i) => {
    el.style.zIndex = N_DECK - i;
    el.style.transition = 'transform 0.85s cubic-bezier(.22,.85,.3,1), opacity 0.4s ease';
    setXform(el, rand(-jitter, jitter), -i * (cardWidth * 0.01) + rand(-jitter, jitter), rand(-3,3), 1 - i * 0.004);
  });
}

// "Trải": xoè thẻ ra thành hình quạt
const CARD_RATIO_WH = 1635 / 2048; // trùng với --card-ratio ở :root (width / height)
const FAN_ANGLE_STEP = 4.2; // độ cong của quạt — giảm so với trước (7.2) để bớt cong hơn
let currentLayoutIsFan = false;

function layoutFan(order){
  currentLayoutIsFan = true;
  const n = order.length;
  const mid = (n - 1) / 2;
  const baseSpacing = cardWidth * 0.34;
  const dip = cardWidth * 0.045;
  const cardHeight = cardWidth / CARD_RATIO_WH;

  // Co giãn cả quạt (không chỉ khoảng cách) để 2 thẻ ngoài cùng luôn nằm
  // gọn trong màn hình, tránh bị mất/cắt cạnh ở 2 bên trên màn hình hẹp.
  const maxT = mid;
  const angleRad = (maxT * FAN_ANGLE_STEP) * Math.PI / 180;
  const projectedHalfW = (cardWidth / 2) * Math.cos(angleRad) + (cardHeight / 2) * Math.sin(angleRad);
  const outerEdge = maxT * baseSpacing + projectedHalfW;
  const availableHalf = window.innerWidth / 2 - 14;
  let fanScale = 1;
  if(outerEdge > 0 && outerEdge > availableHalf){
    fanScale = Math.max(0.5, availableHalf / outerEdge);
  }

  order.forEach((el, i) => {
    const t = i - mid;
    const angle = t * FAN_ANGLE_STEP;
    const tx = t * baseSpacing * fanScale;
    const ty = Math.pow(Math.abs(t), 1.5) * dip * fanScale;
    el.style.zIndex = 100 - Math.round(Math.abs(t) * 2);
    el.style.transition = 'transform 0.95s cubic-bezier(.22,.85,.3,1), opacity 0.4s ease';
    setXform(el, tx, ty, angle, fanScale);
  });
}

// "Trộn": trải quạt nhưng đổi chỗ ngẫu nhiên giữa các thẻ -> tạo cảm giác đang bị xáo trộn thật
function layoutMix(order){
  layoutFan(order);
}

let generation = 0;
let stopped = false;
let currentOrder = shuffleEls.slice();

async function shuffleCycle(myGen){
  layoutStack(currentOrder);
  await wait(1050);
  if(myGen !== generation) return;

  layoutFan(currentOrder);
  await wait(950);
  if(myGen !== generation) return;

  currentOrder = shuffleArrayInPlace(currentOrder);
  layoutMix(currentOrder);
  await wait(850);
  if(myGen !== generation) return;

  currentOrder = shuffleArrayInPlace(currentOrder);
  layoutMix(currentOrder);
  await wait(850);
  if(myGen !== generation) return;

  layoutFan(currentOrder);
  await wait(650);
  if(myGen !== generation) return;

  if(!stopped) shuffleCycle(myGen);
}

shuffleCycle(generation);

/* ==================================================================
   CHUYỂN PHA: nhấn RÚT THẺ -> gom cọc -> văng thẻ -> flash -> reveal
   ================================================================== */
/* ==================================================================
   CHUYỂN PHA: nhấn RÚT THẺ -> gom cọc -> văng thẻ -> flash -> reveal
   ------------------------------------------------------------------
   Thời gian chờ (wait) được canh khớp với thời lượng transition CSS
   tương ứng của từng bước, để không cắt animation giữa chừng (nguyên
   nhân chính khiến chuyển cảnh trước đây bị giật/thiếu mượt). Điểm
   "chuyển cảnh" (đổi từ sân khấu xáo thẻ sang thẻ kết quả) được canh
   đúng lúc màn hình lóe sáng gần như trắng xoá (đỉnh của screen-flash)
   để việc đổi DOM phía sau hoàn toàn bị che, tạo cảm giác 1 pha liền
   mạch thay vì 2 đoạn animation rời rạc nối vào nhau.
   ================================================================== */
const drawBtn = document.getElementById('drawBtn');
const redrawBtn = document.getElementById('redrawBtn');
const screenFlash = document.getElementById('screenFlash');
const drawBtnDefaultText = drawBtn.textContent;

function replayAnim(el){
  if(!el) return;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
}

function pickRandomCard(pool){
  return pool[Math.floor(Math.random() * pool.length)];
}

async function startDrawSequence(){
  drawBtn.disabled = true;
  drawBtn.textContent = 'ĐANG RÚT...';

  // Bắt đầu quét thẻ thật song song với animation gom/văng thẻ,
  // để không cộng dồn thêm thời gian chờ nếu mạng đủ nhanh.
  const poolPromise = getCardsPool();

  // Bước 1 — gom thẻ thành cọc gọn (khớp transition 0.85s của .shuffle-card)
  layoutStack(currentOrder);
  await wait(900);

  // Bước 2 — thẻ trúng dâng lên, về đúng giữa màn hình & phóng to nhẹ,
  // các thẻ còn lại văng ra (khớp transition 0.9s / 0.75s đã khai báo cho từng thẻ)
  const winnerEl = currentOrder[0];
  currentOrder.forEach((el) => {
    if(el === winnerEl){
      el.style.zIndex = 999;
      el.style.transition = 'transform 0.9s cubic-bezier(.2,.8,.2,1)';
      setXform(el, 0, 0, 0, 1.55);
    } else {
      const ang = rand(0, Math.PI * 2);
      const dist = rand(cardWidth * 2.2, cardWidth * 4.4);
      el.style.transition = 'transform 0.75s cubic-bezier(.4,0,.6,1), opacity 0.6s ease';
      el.style.opacity = '0';
      setXform(el, Math.cos(ang) * dist, Math.sin(ang) * dist, rand(-540, 540), 0.6);
    }
  });
  await wait(900);

  // Cần có kết quả (thẻ thật) trước khi loé sáng chuyển cảnh
  const pool = await poolPromise;
  const card = pickRandomCard(pool);

  // Bước 3 — loé sáng toàn màn hình; đợi đúng lúc gần đỉnh sáng nhất
  // rồi mới đổi DOM phía sau, để người xem không thấy điểm "cắt cảnh".
  // Màn hình reveal xuất hiện ngay với thẻ ở mặt sau, thông tin góc phải
  // ẩn cho tới khi người dùng bấm/chạm vào thẻ để lật sang mặt trước —
  // toàn bộ hiệu ứng ánh sáng/hologram của reveal chỉ chạy từ lúc đó.
  screenFlash.classList.remove('active');
  void screenFlash.offsetWidth;
  screenFlash.classList.add('active');
  await wait(180);

  showReveal(card);

  // Nút RÚT THẺ được ẩn ngay khi vào phase-reveal (CSS), trả lại nhãn
  // gốc để sẵn sàng cho lần rút tiếp theo (sau khi bấm "Rút Thẻ Khác").
  drawBtn.textContent = drawBtnDefaultText;
}

drawBtn.addEventListener('click', () => {
  if(stopped) return;
  stopped = true;
  // Tăng generation ngay lập tức để vòng lặp shuffleCycle đang chạy dở
  // (nếu đang ở giữa 1 bước await) dừng lại ở lần kiểm tra kế tiếp,
  // tránh việc nó tiếp tục gọi layoutFan/layoutMix đè lên transform
  // mà startDrawSequence() đang set cho thẻ trúng bay vào giữa màn hình
  // (đây là nguyên nhân khiến thẻ bị giật/lệch trái-phải khi vào giữa).
  generation++;
  startDrawSequence();
});

redrawBtn.addEventListener('click', () => {
  if(burnAnimId){ cancelAnimationFrame(burnAnimId); burnAnimId = null; }
  document.body.classList.remove('phase-reveal');
  document.body.classList.remove('awaiting-flip');
  drawBtn.disabled = false;

  shuffleEls.forEach((el) => {
    el.style.opacity = '1';
    const flipEl = el.querySelector('.sc-flip');
    if(flipEl) flipEl.classList.remove('is-flipped');
  });
  currentOrder = shuffleEls.slice();
  stopped = false;
  generation++;
  shuffleCycle(generation);
});

/* ==================================================================
   PHA 2 — HIỂN THỊ REVEAL (logic gần như nguyên bản từ xem-the.html)
   ================================================================== */
const bgImgEl = document.getElementById('bgImg');
const cardArtEl = document.getElementById('cardArt');
const labelBox = document.getElementById('labelBox');
const labelNum = document.getElementById('labelNum');
const labelTitle = document.getElementById('labelTitle');
const hintText = document.getElementById('hintText');
const cardBackEl = document.getElementById('cardBack');
const burnFlameEl = document.getElementById('burnFlame');
const burnCharEl = document.getElementById('burnChar');
const burnCurlEl = document.getElementById('burnCurl');
const burnEmberLayer = document.getElementById('burnEmberLayer');
const emberConvergeLayer = document.getElementById('emberConvergeLayer');
const igniteFlashEl = document.getElementById('igniteFlash');
let pendingRevealCard = null;

function showReveal(card){
  bgImgEl.style.backgroundImage = `url('${card.img}')`;
  cardArtEl.style.backgroundImage = `url('${card.img}')`;

  // Ẩn thông tin góc phải cho tới khi người dùng bấm lật thẻ.
  labelBox.style.display = 'none';
  labelNum.textContent = card.source || '';
  labelNum.title = card.source || '';
  labelTitle.textContent = MUC_TITLES[card.muc] || '';

  pendingRevealCard = card;
  cardFlipped = false;
  // Reset mặt sau về trạng thái nguyên vẹn (chưa cháy) cho lượt xem mới —
  // huỷ animation lửa cũ (nếu có) và gỡ clip-path/opacity đã áp từ lượt trước.
  if(burnAnimId){ cancelAnimationFrame(burnAnimId); burnAnimId = null; }
  cardBackEl.style.transition = 'none';
  cardBackEl.style.clipPath = '';
  cardBackEl.style.opacity = '1';
  cardBackEl.style.pointerEvents = '';
  void cardBackEl.offsetWidth;
  cardBackEl.style.transition = '';
  burnFlameEl.classList.remove('active');
  burnFlameEl.style.clipPath = '';
  burnFlameEl.style.background = '';
  burnCharEl.classList.remove('active');
  burnCharEl.style.clipPath = '';
  burnCurlEl.classList.remove('active');
  burnCurlEl.style.clipPath = '';
  burnEmberLayer.innerHTML = '';
  emberConvergeLayer.innerHTML = '';
  igniteFlashEl.classList.remove('active');
  if(convergeTimeoutId){ clearTimeout(convergeTimeoutId); convergeTimeoutId = null; }
  stage.classList.add('awaiting-flip');
  document.body.classList.add('awaiting-flip');
  if(hintText){ hintText.textContent = 'Chạm vào thẻ để đốt lộ mặt trước'; replayAnim(hintText); }

  document.body.classList.add('phase-reveal');

  // reset tilt về trung tâm cho lượt xem mới
  curRX = 0; curRY = 0; targetRX = 0; targetRY = 0;
  curPX = 50; curPY = 50; targetPX = 50; targetPY = 50;
  curGlow = 0; targetGlow = 0;
  curScale = 1; targetScale = 1;

  // Chỉ phát lại animation "rơi vào giữa" của khung thẻ; các hiệu ứng
  // loé sáng/sốc/tàn lửa sẽ chờ tới khi người dùng bấm vào thẻ để đốt.
  replayAnim(document.getElementById('cardWrap'));
}

/* ==================================================================
   Đốt cháy mặt sau lan dần từ 1 góc ra khắp thẻ, lộ dần mặt trước bên
   dưới — thay cho cơ chế lật 3D trước đây. Dùng clip-path (path SVG)
   tính động mỗi khung hình thay vì nhiều lớp radial-gradient chồng —
   cho viền cháy là 1 đường liền mạch, lởm chởm tự nhiên, không bị vỡ
   thành các "vòng" giả như cách dùng gradient trước đó.
   ================================================================== */
let burnAnimId = null;
let convergeTimeoutId = null;

function spawnBurnEmber(xPct, yPct){
  const el = document.createElement('div');
  el.className = 'ember' + (Math.random() < 0.35 ? ' big' : '');
  el.style.left = xPct + '%';
  el.style.top = yPct + '%';
  el.style.setProperty('--drift', rand(-16, 16).toFixed(0) + 'px');
  el.style.animationDuration = (650 + Math.random() * 500) + 'ms';
  burnEmberLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// Tàn lửa nhỏ bay từ ngoài rìa màn hình hội tụ dồn vào đúng điểm sẽ bén
// lửa trên thẻ — tạo nhịp "chờ đợi - dồn lại" trước khi bùng cháy, thay
// vì lửa bắt đầu ngay lập tức. Dùng CSS transition thay vì rAF cho từng
// hạt (nhẹ hơn, mượt hơn khi có nhiều hạt cùng lúc).
function spawnConvergeSpark(sx, sy, tx, ty, delay, duration, big){
  const el = document.createElement('div');
  el.className = 'spark-converge' + (big ? ' big' : '');
  el.style.left = sx.toFixed(1) + 'px';
  el.style.top = sy.toFixed(1) + 'px';
  emberConvergeLayer.appendChild(el);
  void el.offsetWidth;
  requestAnimationFrame(() => {
    el.style.transition =
      `left ${duration}ms cubic-bezier(.5,0,1,.4) ${delay}ms, ` +
      `top ${duration}ms cubic-bezier(.5,0,1,.4) ${delay}ms, ` +
      `transform ${duration}ms cubic-bezier(.5,0,1,.4) ${delay}ms, ` +
      `opacity 140ms ease ${delay}ms`;
    el.classList.add('visible');
    el.style.left = tx.toFixed(1) + 'px';
    el.style.top = ty.toFixed(1) + 'px';
    el.style.transform = 'scale(0.3)';
  });
  setTimeout(() => el.remove(), delay + duration + 80);
}

// Bắn ra 1 đợt tàn lửa hội tụ từ quanh màn hình vào (tx, ty) — trả về
// tổng thời gian (ms) tới khi hạt cuối cùng hội tụ xong, để phần gọi biết
// khi nào nên bùng lửa.
function convergeEmbersTo(tx, ty){
  emberConvergeLayer.innerHTML = '';
  const COUNT = 20;
  const spread = Math.min(window.innerWidth, window.innerHeight);
  let maxFinish = 0;
  for(let i = 0; i < COUNT; i++){
    const angle = rand(0, Math.PI * 2);
    const dist = rand(spread * 0.22, spread * 0.62);
    const sx = tx + Math.cos(angle) * dist;
    const sy = ty + Math.sin(angle) * dist;
    const delay = rand(0, 420);
    const duration = rand(520, 820);
    const big = Math.random() < 0.3;
    spawnConvergeSpark(sx, sy, tx, ty, delay, duration, big);
    maxFinish = Math.max(maxFinish, delay + duration);
  }
  return maxFinish;
}

function triggerIgniteFlash(x, y){
  igniteFlashEl.style.left = x.toFixed(1) + 'px';
  igniteFlashEl.style.top = y.toFixed(1) + 'px';
  igniteFlashEl.classList.remove('active');
  void igniteFlashEl.offsetWidth;
  igniteFlashEl.classList.add('active');
}

function triggerCardFlip(){
  if(cardFlipped || !document.body.classList.contains('phase-reveal')) return;
  cardFlipped = true;
  stage.classList.remove('awaiting-flip');
  document.body.classList.remove('awaiting-flip');

  if(hintText){ hintText.textContent = 'Tàn lửa đang tụ lại…'; replayAnim(hintText); }

  // Điểm sẽ bén lửa — gần giữa thẻ, có xê dịch ngẫu nhiên mỗi lượt để
  // không lặp lại y hệt nhau. Tàn lửa từ khắp màn hình sẽ hội tụ về đây
  // trước khi bùng thành lửa lan toả hình tròn ra khắp thẻ.
  const rect = cardBackEl.getBoundingClientRect();
  const W = Math.max(1, rect.width), H = Math.max(1, rect.height);
  const ox = W * (0.5 + rand(-0.14, 0.14));
  const oy = H * (0.5 + rand(-0.14, 0.14));
  const targetX = rect.left + ox;
  const targetY = rect.top + oy;

  const convergeMs = convergeEmbersTo(targetX, targetY);

  convergeTimeoutId = setTimeout(() => {
    convergeTimeoutId = null;
    igniteAndBurn(ox, oy, targetX, targetY, W, H);
  }, convergeMs + 60);
}

/* ==================================================================
   Sau khi tàn lửa hội tụ xong: bùng loé sáng tại điểm hội tụ, rồi lửa
   lan toả hình tròn (mọi hướng, không chỉ 1 góc) ra khắp mặt sau, lộ
   dần mặt trước bên dưới. Dùng clip-path (path SVG) tính động mỗi khung
   hình thay vì nhiều lớp radial-gradient chồng — cho viền cháy là 1
   đường liền mạch, lởm chởm tự nhiên, không bị vỡ thành các "vòng" giả.
   ================================================================== */
function igniteAndBurn(ox, oy, targetX, targetY, W, H){
  triggerIgniteFlash(targetX, targetY);

  labelBox.style.display = '';
  if(hintText){ hintText.textContent = 'Di chuột hoặc chạm để xoay thẻ'; replayAnim(hintText); }

  // phát lại toàn bộ hiệu ứng mở thẻ từ đầu
  replayAnim(document.getElementById('revealBurst'));
  replayAnim(document.getElementById('revealFlash'));
  document.querySelectorAll('#revealFlash .ember').forEach(replayAnim);

  // Bán kính cần để lửa lan phủ hết thẻ từ điểm (ox, oy) — khoảng cách xa
  // nhất tới 1 trong 4 góc thẻ (vì điểm bén lửa nằm giữa thẻ, không phải
  // ở góc, nên bán kính cần dùng phải tính theo góc xa nhất).
  const farX = Math.max(ox, W - ox);
  const farY = Math.max(oy, H - oy);
  const diag = Math.sqrt(farX * farX + farY * farY);

  // Vài lớp nhiễu (hoạ tiết sóng sin chồng tần số khác nhau) áp lên bán
  // kính theo góc quét — tạo mép cháy lởm chởm, mỗi lần đốt một hình dạng
  // khác nhau, không lặp lại, và có rung nhẹ theo thời gian như lửa thật
  // đang liếm/nhấp nháy chứ không phải 1 đường viền cứng đơ.
  const harmonics = [2, 3, 5, 7, 9, 13, 19, 27, 42].map((k) => ({
    k, amp: (k <= 9 ? rand(0.12, 0.26) : (k <= 19 ? rand(0.035, 0.07) : rand(0.015, 0.03))) / Math.sqrt(k), phase: rand(0, Math.PI * 2), tSpeed: rand(0.002, 0.006)
  }));
  // Nhiễu răng cưa tần số cao — dùng sin đã "chỉnh lũy thừa" (dấu giữ nguyên,
  // biên độ mũ 3) để tạo các gai nhọn hẹp xen giữa các đoạn phẳng, giống vết
  // xé của giấy cháy, thay vì toàn bộ là đường cong tròn trịa của sin thuần.
  const jagK = [23, 34, 51, 71];
  const jagPhase = jagK.map(() => rand(0, Math.PI * 2));
  function noise(theta, t){
    let n = 0;
    for(const h of harmonics) n += h.amp * Math.sin(h.k * theta + h.phase + t * h.tSpeed);
    let jag = 0;
    for(let i = 0; i < jagK.length; i++){
      const s = Math.sin(jagK[i] * theta + jagPhase[i]);
      jag += Math.sign(s) * Math.pow(Math.abs(s), 3) * (0.028 / (i + 1));
    }
    return n + jag;
  }

  // Quét trọn 1 vòng tròn (0 → 2π) quanh điểm bén lửa thay vì chỉ 1/4
  // cung như trước — vì giờ lửa lan ra MỌI hướng từ 1 điểm giữa thẻ.
  const SEGMENTS = 56;
  function sectorPath(R, t, scale){
    let d = '';
    for(let i = 0; i <= SEGMENTS; i++){
      const theta = (i / SEGMENTS) * Math.PI * 2;
      const r = Math.max(0, R * scale * (1 + noise(theta, t)));
      const px = ox + Math.cos(theta) * r;
      const py = oy + Math.sin(theta) * r;
      d += (i === 0 ? `M${px.toFixed(1)},${py.toFixed(1)} ` : `L${px.toFixed(1)},${py.toFixed(1)} `);
    }
    d += 'Z';
    return d;
  }
  const outerRect = `M0,0 L${W.toFixed(1)},0 L${W.toFixed(1)},${H.toFixed(1)} L0,${H.toFixed(1)} Z`;

  const duration = 1250; // lửa lan chậm rãi, mượt, đủ để mắt nhìn theo được mép cháy
  const startTime = performance.now();
  burnFlameEl.classList.add('active');
  burnFlameEl.style.background =
    `radial-gradient(circle at ${ox.toFixed(1)}px ${oy.toFixed(1)}px, #fff8e6 0%, #ffe19a 5%, #ffb04a 11%, #ff7a1f 19%, #e8380d 30%, #941f06 42%, #2a0a03 58%, transparent 76%)`;

  let lastEmberTime = 0;

  function frame(now){
    const t = now - startTime;
    const p = Math.min(1, t / duration);
    // Lửa bén chậm rãi lúc đầu (mồi bén), càng về sau càng lan nhanh hơn,
    // rồi khựng nhẹ lại gần cuối như đang liếm nốt phần giấy còn sót —
    // mượt và tự nhiên hơn hẳn một đường cong tăng tốc đơn thuần.
    const eased = p < 0.18
      ? Math.pow(p / 0.18, 1.4) * 0.16
      : 0.16 + (1 - Math.pow(1 - (p - 0.18) / 0.82, 2.1)) * 0.84;
    const flicker = 1 + Math.sin(t * 0.05) * 0.012 + (Math.random() - 0.5) * 0.018;
    const R = eased * diag * 1.12 * flicker;

    const mainPath = sectorPath(R, t, 1);
    cardBackEl.style.clipPath = `path(evenodd, "${outerRect} ${mainPath}")`;

    // Vết than: đúng bằng vùng đã cháy qua (mainPath), co lại một chút so
    // với mép lửa đang cháy (0.94) để phần than luôn nằm khuất dưới dải lửa
    // sáng, không lộ viền cứng giữa 2 lớp.
    burnCharEl.classList.add('active');
    burnCharEl.style.clipPath = `path(evenodd, "${outerRect} ${sectorPath(R, t, 0.94)}")`;

    // Dải lửa+than liền mạch bám sát đúng mép đang cháy (giữa 2 path lệch
    // bán kính) — gradient bên trong .burn-flame tự chuyển từ than đen
    // (phía trong, giáp phần giấy còn nguyên) sang cam/vàng rực (đúng mép
    // ngoài đang cháy), nên không cần lớp than tách rời chồng lên trên —
    // tất cả là MỘT dải duy nhất luôn khớp hình lởm chởm của mép cháy.
    const glowOuter = sectorPath(R, t, 1.035);
    const glowInner = sectorPath(R, t, 0.86);
    burnFlameEl.style.clipPath = `path(evenodd, "${glowOuter} ${glowInner}")`;

    // Bóng mép quăn: dải rất hẹp ngay sát trong mép lửa (0.80–0.865), giả
    // lập giấy hơi cong vênh lên khi cháy nên đổ bóng tối xuống phần than
    // ngay bên dưới — phá vỡ cảm giác "cắt phẳng lì" của clip-path.
    burnCurlEl.classList.add('active');
    burnCurlEl.style.clipPath = `path(evenodd, "${sectorPath(R, t, 0.865)} ${sectorPath(R, t, 0.80)}")`;

    if(p < 0.92 && now - lastEmberTime > 55 && Math.random() < 0.6){
      lastEmberTime = now;
      const theta = rand(0, Math.PI * 2);
      const r = Math.max(0, R * (1 + noise(theta, t)));
      const ex = Math.max(1, Math.min(99, ((ox + Math.cos(theta) * r) / W) * 100));
      const ey = Math.max(1, Math.min(99, ((oy + Math.sin(theta) * r) / H) * 100));
      spawnBurnEmber(ex, ey);
    }

    if(p < 1){
      burnAnimId = requestAnimationFrame(frame);
    } else {
      burnAnimId = null;
      cardBackEl.style.opacity = '0';
      cardBackEl.style.pointerEvents = 'none';
      burnFlameEl.classList.remove('active');
      burnFlameEl.style.background = '';
      burnCharEl.classList.remove('active');
      burnCurlEl.classList.remove('active');
    }
  }
  burnAnimId = requestAnimationFrame(frame);
}

/* ---------- Tự nhận diện độ sáng nền ảnh để đổi màu chữ/khung sáng-tối ---------- */
function srgbChannelToLinear(c){
  c = c / 255;
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}
function relativeLuminance(r, g, b){
  return 0.2126 * srgbChannelToLinear(r) + 0.7152 * srgbChannelToLinear(g) + 0.0722 * srgbChannelToLinear(b);
}
function averageRelativeLuminance(imageData){
  const d = imageData.data;
  let total = 0, count = 0;
  for(let i = 0; i < d.length; i += 4){
    const a = d[i + 3];
    if(a < 10) continue;
    total += relativeLuminance(d[i], d[i + 1], d[i + 2]);
    count++;
  }
  return count ? total / count : 0.5;
}
function shouldUseDarkText(bgLum){
  const contrastWithWhite = 1.05 / (bgLum + 0.05);
  const contrastWithBlack = (bgLum + 0.05) / 0.05;
  return contrastWithBlack > contrastWithWhite;
}
function mapScreenRectToImageRect(rect, imgW, imgH){
  const vw = window.innerWidth, vh = window.innerHeight;
  const boxW = (vw + 120) * 1.12;
  const boxH = (vh + 120) * 1.12;
  const scale = Math.max(boxW / imgW, boxH / imgH);
  const scaledW = imgW * scale, scaledH = imgH * scale;
  const boxLeft = (vw - boxW) / 2;
  const boxTop  = (vh - boxH) / 2;
  const imgLeft = boxLeft + (boxW - scaledW) / 2;
  const imgTop  = boxTop  + (boxH - scaledH) / 2;
  return {
    left:   (rect.left   - imgLeft) / scale,
    right:  (rect.right  - imgLeft) / scale,
    top:    (rect.top    - imgTop)  / scale,
    bottom: (rect.bottom - imgTop)  / scale
  };
}

let cachedThemeImg = null;

function sampleLuminanceForElement(ctx, cw, ch, ratio, imgNaturalW, imgNaturalH, el){
  const rect = el.getBoundingClientRect();
  if(rect.width === 0 || rect.height === 0){
    return averageRelativeLuminance(ctx.getImageData(0, 0, cw, ch));
  }
  const src = mapScreenRectToImageRect(rect, imgNaturalW, imgNaturalH);
  let left   = Math.max(0, Math.min(cw - 1, Math.floor(src.left   * ratio)));
  let top    = Math.max(0, Math.min(ch - 1, Math.floor(src.top    * ratio)));
  let right  = Math.max(left + 1, Math.min(cw, Math.ceil(src.right  * ratio)));
  let bottom = Math.max(top + 1,  Math.min(ch, Math.ceil(src.bottom * ratio)));
  return averageRelativeLuminance(ctx.getImageData(left, top, right - left, bottom - top));
}

function recomputeTheme(){
  // Tên mục (label) khi reveal thẻ giữ cố định màu trắng (is-dark) vì nền
  // luôn tối màu — không tự đổi màu theo độ sáng ảnh thẻ nữa (tránh nhảy màu).
  labelBox.classList.remove('is-light');
  labelBox.classList.add('is-dark');
}

function applyAdaptiveTheme(src){
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { cachedThemeImg = img; recomputeTheme(); };
  img.onerror = () => {};
  img.src = src;
}

let resizeThemeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeThemeTimer);
  resizeThemeTimer = setTimeout(recomputeTheme, 150);
});

/* ---------- Hiệu ứng nghiêng / xoay / hologram ---------- */
const stage = document.getElementById('stage');
const cardInner = document.getElementById('cardInner');
const holoSheen = document.getElementById('holoSheen');
const holoGlare = document.getElementById('holoGlare');
const holoEdge = document.getElementById('holoEdge');
const shineSweep = document.getElementById('shineSweep');
const sparkleLayer = document.getElementById('sparkleLayer');
const cardShadowEl = document.querySelector('.card-shadow');

function spawnSparkle(){
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = (8 + Math.random() * 84) + '%';
  el.style.top = (8 + Math.random() * 84) + '%';
  el.style.animationDuration = (650 + Math.random() * 500) + 'ms';
  sparkleLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;
let targetPX = 50, targetPY = 50, curPX = 50, curPY = 50;
let targetGlow = 0, curGlow = 0;
let targetScale = 1, curScale = 1;
let cardFlipped = false;
let pointerActive = false;
let idleT = Math.random() * 10;
let jitterX = 0, jitterY = 0;

function onPointerMove(e){
  const rect = cardInner.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = (e.clientX - cx) / (rect.width / 2);
  let dy = (e.clientY - cy) / (rect.height / 2);
  dx = Math.max(-1, Math.min(1, dx));
  dy = Math.max(-1, Math.min(1, dy));
  targetRY = dx * 24;
  targetRX = dy * -19;
  targetPX = 50 + dx * 42;
  targetPY = 50 + dy * 42;
  targetGlow = 0.6;
  targetScale = 1.045;
  pointerActive = true;
}
function onPointerLeave(){
  pointerActive = false;
  targetGlow = 0;
  targetScale = 1;
}
stage.addEventListener('pointermove', onPointerMove);
stage.addEventListener('pointerleave', onPointerLeave);
stage.addEventListener('pointercancel', onPointerLeave);
stage.addEventListener('pointerdown', onPointerMove);

// Chạm/bấm vào thẻ (hoặc bất cứ đâu trên sân khấu, để dễ bấm trên di động)
// trong lúc đang chờ lật sẽ kích hoạt lật thẻ sang mặt trước.
stage.addEventListener('click', () => {
  if(stage.classList.contains('awaiting-flip')) triggerCardFlip();
});

function loop(){
  if(document.body.classList.contains('phase-reveal') && !pointerActive){
    idleT += 0.008;
    jitterX += (Math.random() - 0.5) * 0.5;
    jitterY += (Math.random() - 0.5) * 0.5;
    jitterX *= 0.94;
    jitterY *= 0.94;
    targetRY = Math.sin(idleT) * 13 + jitterX;
    targetRX = Math.cos(idleT * 0.7) * 6 + jitterY;
    targetPX = 50 + Math.sin(idleT) * 20;
    targetPY = 50 + Math.cos(idleT * 0.8) * 20;
    targetGlow = 0.22 + Math.sin(idleT * 1.3) * 0.1;
    targetScale = 1;
  }

  curRX += (targetRX - curRX) * 0.09;
  curRY += (targetRY - curRY) * 0.09;
  curPX += (targetPX - curPX) * 0.08;
  curPY += (targetPY - curPY) * 0.08;
  curGlow += (targetGlow - curGlow) * 0.08;
  curScale += (targetScale - curScale) * 0.08;

  cardInner.style.transform = `scale(${curScale}) rotateX(${curRX}deg) rotateY(${curRY}deg)`;
  cardShadowEl.style.transform = `translateZ(-40px) translateX(${curRY * -1.6}px) translateY(${curRX * 1.2}px) scale(${1 - Math.abs(curRY) * 0.006}, ${1 - Math.abs(curRX) * 0.006})`;
  holoSheen.style.backgroundPosition = `${curPX}% ${curPY}%, ${100 - curPX}% ${100 - curPY}%`;
  shineSweep.style.backgroundPosition = `${curPX}% ${curPY}%`;

  if(document.body.classList.contains('phase-reveal') && curGlow > 0.42 && Math.random() < curGlow * 0.05){
    spawnSparkle();
  }
  holoGlare.style.setProperty('--gx', curPX + '%');
  holoGlare.style.setProperty('--gy', curPY + '%');
  holoGlare.style.opacity = curGlow;
  holoEdge.style.setProperty('--edge-op', Math.min(1, curGlow * 1.4));

  requestAnimationFrame(loop);
}
loop();
</script>
