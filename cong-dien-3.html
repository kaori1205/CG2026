<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Công Diễn 3 · Hành Trình 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0a0503;
    --ember-deep:#2c0904;
    --ember:#e8380d;
    --flame:#ff8a1e;
    --gold:#f4d35e;
    --gold-dim:#b8862f;
    --steel:#d7dbe0;
    --steel-dim:#7d838c;
    --iron:#1a1512;
    --text-light:#f2ece0;
    --text-muted:#a99b8c;
    --card-w: clamp(118px, 27vw, 55mm);
    --card-ratio: 1635 / 2048; /* tỉ lệ khung ảnh thẻ: 1635 x 2048 px */
    --radius: 3mm;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 700px at 50% 8%, rgba(232,56,13,0.28), transparent 60%),
      radial-gradient(ellipse 1200px 900px at 15% 100%, rgba(255,138,30,0.14), transparent 55%),
      radial-gradient(ellipse 1200px 900px at 85% 100%, rgba(232,56,13,0.12), transparent 55%),
      linear-gradient(180deg, #170604 0%, var(--void) 45%, #050202 100%);
    color:var(--text-light);
    font-family:'Source Sans 3', sans-serif;
    min-height:100vh;
    padding: 56px 24px 90px;
    position:relative;
    overflow-x:hidden;
  }

  .streak{
    position:fixed;
    top:0; bottom:0;
    width:2px;
    background:linear-gradient(180deg, transparent, rgba(255,138,30,0.5), transparent);
    filter: blur(1px);
    pointer-events:none;
    z-index:0;
  }
  .streak.s1{ left:8%; opacity:0.5; transform:rotate(14deg);}
  .streak.s2{ left:88%; opacity:0.35; transform:rotate(-14deg);}
  .streak.s3{ left:50%; opacity:0.2; transform:rotate(8deg);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .header{
    max-width: 980px;
    margin: 0 auto 50px;
    text-align:center;
    position:relative;
    z-index:1;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--flame);
    margin-bottom:16px;
    max-width:520px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.7;
  }
  h1{
    font-family:'Playfair Display', 'Alfa Slab One', serif;
    font-weight:900;
    font-size:clamp(38px, 6vw, 64px);
    margin:0 0 14px;
    letter-spacing:0.02em;
    text-transform:uppercase;
    line-height:1.4;
    padding:0.15em 0;
    background: linear-gradient(180deg, #ffffff 0%, var(--steel) 35%, var(--gold) 75%, var(--flame) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter: drop-shadow(0 2px 18px rgba(232,56,13,0.45));
  }
  h1 span{ display:inline; }
  .sub{
    color:var(--text-muted);
    font-size:12px;
    letter-spacing:0.06em;
    max-width:560px;
    margin:0 auto;
    line-height:1.6;
  }
  .sub strong{color:var(--flame); font-weight:600;}
  .sub span{ display:block; }

  .tray{
    max-width: 1180px;
    margin: 0 auto;
    position:relative;
    z-index:1;
    background:
      linear-gradient(180deg, rgba(42,16,10,0.7), rgba(10,5,3,0.85));
    border-radius: 18px;
    padding: 46px;
    box-shadow:
      inset 0 2px 14px rgba(0,0,0,0.6),
      0 0 0 1px rgba(244,211,94,0.14),
      0 0 60px rgba(232,56,13,0.12),
      0 30px 70px -20px rgba(0,0,0,0.75);
  }

  .grid{
    display:flex;
    flex-wrap:nowrap;
    align-items:flex-start;
    gap: 28px;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;
    padding: 16px 6px 32px;
    margin: -16px -6px -32px;
    cursor:grab;
    scrollbar-width:thin;
    scrollbar-color: var(--flame) rgba(255,255,255,0.06);
  }
  .grid.dragging{ cursor:grabbing; scroll-snap-type:none; }
  .grid::-webkit-scrollbar{ height:8px; }
  .grid::-webkit-scrollbar-track{ background:rgba(255,255,255,0.06); border-radius:10px; }
  .grid::-webkit-scrollbar-thumb{ background:linear-gradient(90deg, var(--gold), var(--flame)); border-radius:10px; }

  .collection-head{
    display:flex;
    align-items:baseline;
    flex-wrap:wrap;
    gap:10px 14px;
    margin: 0 4px 20px;
  }
  .collection-num{
    font-family:'Anton', sans-serif;
    font-size:15px;
    letter-spacing:0.08em;
    color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    padding:4px 10px;
    border-radius:3px;
  }
  .collection-title{
    font-family:'Anton', sans-serif;
    font-weight:400;
    font-size:clamp(20px, 2.6vw, 28px);
    letter-spacing:0.02em;
    text-transform:uppercase;
    color:var(--text-light);
    flex:0 1 auto;
    min-width:0;
    overflow-wrap:break-word;
    word-break:break-word;
    line-height:1.25;
  }
  .collection-rule{
    flex:1 1 24px;
    min-width:24px;
    height:1px;
    background: linear-gradient(90deg, rgba(244,211,94,0.5), transparent);
    margin-left:6px;
    align-self:center;
  }

  .slot{
    width:var(--card-w);
    aspect-ratio: var(--card-ratio);
    position:relative;
    flex:0 0 auto;
    scroll-snap-align:start;
  }
  .slot::after{
    content:"";
    position:absolute;
    left:8%; right:8%; bottom:-12px;
    height:16px;
    background: radial-gradient(ellipse, rgba(232,56,13,0.35), transparent 70%);
    filter: blur(4px);
    z-index:0;
  }

  .face-front{
    position:relative;
    width:100%;
    height:100%;
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--iron);
    display:flex;
    flex-direction:column;
    padding:3px;
    cursor:pointer;
    transition: transform 0.3s cubic-bezier(.2,.8,.2,1), box-shadow 0.3s ease;
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.5),
      0 0 22px rgba(232,56,13,0.35),
      0 12px 24px -8px rgba(0,0,0,0.7);
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
  }
  .slot:hover .face-front,
  .slot.raised .face-front{
    transform: translateY(-10px) scale(1.035);
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.75),
      0 0 34px rgba(232,56,13,0.55),
      0 28px 44px -12px rgba(0,0,0,0.85);
  }
  .slot.raised .face-front{
    transform: translateY(-14px) scale(1.05);
  }
  .face-front .art-wrap{
    flex:1;
    border-radius: calc(var(--radius) - 1.5px);
    overflow:hidden;
    position:relative;
    background: var(--iron);
  }
  .face-front .art{
    position:absolute; inset:0;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
  }

  .footer-note{
    max-width:980px;
    margin:30px auto 0;
    text-align:center;
    color:var(--steel-dim);
    font-size:12.5px;
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.05em;
    position:relative;
    z-index:1;
  }

  /* ---------- Overview (7 collection tiles) ---------- */
  .overview{
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap:30px;
    position:relative;
    z-index:1;
  }
  .tile{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    text-align:center;
    padding:28px 20px;
    border-radius:14px;
    cursor:pointer;
    aspect-ratio:3/4;
    text-decoration:none;
    background:
      radial-gradient(ellipse at 50% 15%, rgba(232,56,13,0.3), transparent 60%),
      linear-gradient(180deg, rgba(42,16,10,0.85), rgba(10,5,3,0.95));
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.35),
      inset 0 0 34px rgba(232,56,13,0.12),
      0 18px 40px -14px rgba(0,0,0,0.7);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .tile:hover, .tile:focus-visible{
    transform: translateY(-6px) scale(1.02);
    box-shadow:
      0 0 0 1px rgba(244,211,94,0.6),
      inset 0 0 40px rgba(232,56,13,0.2),
      0 0 30px rgba(232,56,13,0.4),
      0 24px 50px -16px rgba(0,0,0,0.8);
    outline:none;
  }
  .tile .tile-num{
    position:absolute;
    top:14px; left:14px;
    font-family:'Anton', sans-serif;
    font-size:14px;
    letter-spacing:0.08em;
    color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    padding:5px 11px;
    border-radius:4px;
  }
  .tile .tile-title{
    font-family:'Playfair Display', 'Alfa Slab One', serif;
    font-weight:900;
    font-size:clamp(20px, 2.8vw, 27px);
    text-transform:uppercase;
    letter-spacing:0.02em;
    color:var(--text-light);
    line-height:1.5;
    padding:0.1em 0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
  .tile .tile-count{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--gold);
    background:rgba(10,5,3,0.5);
    padding:5px 12px;
    border-radius:20px;
    border:1px solid rgba(244,211,94,0.4);
  }

  /* ---------- Detail page ---------- */
  .detail-top{
    max-width:1180px;
    margin:0 auto 26px;
    position:relative;
    z-index:1;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:transparent;
    border:1px solid rgba(244,211,94,0.4);
    color:var(--gold);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:9px 16px;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    margin-bottom:22px;
    transition: all 0.25s ease;
  }
  .back-btn:hover{
    background: rgba(232,56,13,0.12);
    border-color: var(--flame);
    color: var(--flame);
  }
  .detail .collection-head{ margin: 0 4px; }
  .muc-block{
    max-width:1180px;
    margin: 0 auto 44px;
    position:relative;
    z-index:1;
  }


  /* ---------- Responsive tweaks cho nhiều kích thước màn hình ---------- */
  @media (max-width: 900px){
    body{ padding: 44px 18px 70px; }
    .tray{ padding: 30px 22px; }
    .grid{ gap: 26px 18px; }
    .overview{ gap: 20px; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
  }
  @media (max-width: 560px){
    body{ padding: 32px 12px 56px; }
    .header{ margin-bottom: 34px; }
    .tray{ padding: 20px 14px; border-radius: 14px; }
    .grid{ gap: 20px 12px; }
    .collection-head{ margin: 0 2px 14px; }
    .overview{ grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
    .tile{ padding: 18px 14px; gap: 10px; }
    .tile .tile-num{ top:10px; left:10px; font-size:12px; padding:4px 9px; }
    .back-btn{ padding: 8px 14px; font-size: 11px; }
  }
  @media (max-width: 360px){
    :root{ --card-w: clamp(100px, 40vw, 55mm); }
    .grid{ gap: 16px 10px; }
  }
</style>
</head>

  <!--

    HƯỚNG DẪN TỰ CẬP NHẬT NỘI DUNG TRANG NÀY

    2) QUY TẮC ĐẶT ẢNH THẺ (mỗi mục có 4 thẻ theo mặc định):

           images/cong-dien-3/muc-01/
           images/cong-dien-3/muc-02/
           ...
           images/cong-dien-3/muc-10/
         (một thư mục con cho MỖI mục, nằm trong images/cong-dien-3/,
          cùng cấp với file HTML này.)
       - Trong mỗi thư mục mục, đặt 4 ảnh .png tên lần lượt:
           anh-the-1.png
           anh-the-2.png
           anh-the-3.png
           anh-the-4.png
       - Ảnh sẽ tự động hiển thị, không cần sửa code.

    3) THÊM THẺ VÀO MỘT MỤC (nhiều hơn 4 thẻ):
       - Kéo xuống phần <script> ở cuối trang, tìm mảng CARDS.
       - Mỗi thẻ là một dòng dạng:
           { muc: X, img: "images/cong-dien-3/muc-0X/anh-the-Z.png" }
         trong đó:
           X = số thứ tự mục (1-10, khớp với "Mục 0X" muốn thêm thẻ)
           Z = số thứ tự ảnh mới trong thư mục mục đó (5, 6, 7, ...)
       - Copy 1 dòng bất kỳ có cùng "muc: X", dán thêm 1 dòng mới ngay
         bên dưới, sửa lại tên file ảnh (anh-the-5.png, ...).
       - Nhớ đặt ảnh anh-the-5.png (v.v.) vào đúng thư mục
         images/cong-dien-3/muc-0X/ tương ứng.
       - Không giới hạn số thẻ tối đa trong 1 mục, cứ thêm dòng + ảnh
         theo đúng quy tắc trên là được.

    4) MUỐN BỚT THẺ:
       - Xoá dòng tương ứng trong mảng CARDS (và có thể xoá ảnh nếu
         không dùng nữa).
    ============================================================
  -->

// - Ảnh đặt trong images/cong-dien-3/muc-0X/anh-the-Y.png (X = số mục, Y = số thứ tự thẻ trong mục).
// - Mặc định mỗi mục có 4 thẻ (anh-the-1..4). Xem hướng dẫn ở đầu trang HTML để thêm/bớt thẻ.

function enableDragScroll(el){
  let isDown = false, startX = 0, startScroll = 0, moved = false;
  el.addEventListener('mousedown', (e) => {
    isDown = true; moved = false;
    startX = e.pageX;
    startScroll = el.scrollLeft;
    el.classList.add('dragging');
  });
  window.addEventListener('mouseup', () => {
    isDown = false;
    el.classList.remove('dragging');
  });
  el.addEventListener('mouseleave', () => {
    isDown = false;
    el.classList.remove('dragging');
  });
  el.addEventListener('mousemove', (e) => {
    if(!isDown) return;
    const walk = e.pageX - startX;
    if(Math.abs(walk) > 5) moved = true;
    if(moved){
      e.preventDefault();
      el.scrollLeft = startScroll - walk;
    }
  });
  el.addEventListener('click', (e) => {
    if(moved){
      e.stopPropagation();
      moved = false;
    }
  }, true);
}

function makeSlot(c){
  const slot = document.createElement('div');
  slot.className = 'slot';
  slot.tabIndex = 0;
  slot.setAttribute('role','button');
  slot.setAttribute('aria-label', `Xem thẻ sưu tập mục ${c.muc}`);

  slot.innerHTML = `
    <div class="face-front">
      <div class="art-wrap">
        <div class="art" style="background-image:url('${c.img}')"></div>
      </div>
    </div>
  `;

  function openCard(){
    // Lấy tên mục hiện tại (có thể đã được đổi tên thủ công) để hiển thị ở trang chi tiết
    const grid = document.getElementById('grid-' + c.muc);
    const mucBlock = grid ? grid.closest('.muc-block') : null;
    const titleEl = mucBlock ? mucBlock.querySelector('.collection-title') : null;
    const mucTitle = titleEl ? titleEl.textContent.trim() : '';

    const url = new URL('xem-the.html', location.href);
    url.searchParams.set('img', c.img);
    url.searchParams.set('muc', c.muc);
    if(mucTitle) url.searchParams.set('title', mucTitle);
    url.searchParams.set('from', 'cong-dien-3.html');

    location.href = url.toString();
  }

  slot.addEventListener('click', openCard);
  slot.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openCard();
    }
  });

  return slot;
}

CARDS.forEach((c) => {
  const grid = document.getElementById('grid-' + c.muc);
  if(grid) grid.appendChild(makeSlot(c));
});

document.querySelectorAll('.grid').forEach(enableDragScroll);
