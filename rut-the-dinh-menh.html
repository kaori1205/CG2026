<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rút Thẻ Định Mệnh · Hành Trình 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0a0503;
    --ember-deep:#2c0904;
    --ember:#e8380d;
    --flame:#ff8a1e;
    --gold:#f4d35e;
    --gold-dim:#b8862f;
    --steel:#d7dbe0;
    --steel-dim:#7d838c;
    --iron:#1a1512;
    --text-light:#f2ece0;
    --text-muted:#a99b8c;
    --card-w: clamp(96px, 22vw, 150px);
    --card-ratio: 1635 / 2048;
    --radius: 3mm;
    --card-depth: 10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 700px at 50% 8%, rgba(232,56,13,0.28), transparent 60%),
      radial-gradient(ellipse 1200px 900px at 15% 100%, rgba(255,138,30,0.14), transparent 55%),
      radial-gradient(ellipse 1200px 900px at 85% 100%, rgba(232,56,13,0.12), transparent 55%),
      linear-gradient(180deg, #170604 0%, var(--void) 45%, #050202 100%);
    color:var(--text-light);
    font-family:'Source Sans 3', sans-serif;
    min-height:100vh;
    padding: 56px 24px 90px;
    position:relative;
    overflow-x:hidden;
  }

  .streak{
    position:fixed;
    top:0; bottom:0;
    width:2px;
    background:linear-gradient(180deg, transparent, rgba(255,138,30,0.5), transparent);
    filter: blur(1px);
    pointer-events:none;
    z-index:0;
  }
  .streak.s1{ left:8%; opacity:0.5; transform:rotate(14deg);}
  .streak.s2{ left:88%; opacity:0.35; transform:rotate(-14deg);}
  .streak.s3{ left:50%; opacity:0.2; transform:rotate(8deg);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .detail-top{ max-width:1180px; margin:0 auto 26px; position:relative; z-index:1; }
  .back-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:transparent; border:1px solid rgba(244,211,94,0.4); color:var(--gold);
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    padding:9px 16px; border-radius:30px; cursor:pointer; text-decoration:none;
    margin-bottom:22px; transition: all 0.25s ease;
  }
  .back-btn:hover{ background: rgba(232,56,13,0.12); border-color: var(--flame); color: var(--flame); }

  .header{ max-width: 980px; margin: 0 auto 42px; text-align:center; position:relative; z-index:1; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.05em; color:var(--flame);
    margin-bottom:16px; max-width:520px; margin-left:auto; margin-right:auto; line-height:1.7;
  }
  h1{
    font-family:'Playfair Display', 'Alfa Slab One', serif; font-weight:900;
    font-size:clamp(34px, 5.6vw, 58px); margin:0 0 14px; letter-spacing:0.02em;
    text-transform:uppercase; line-height:1.4; padding:0.15em 0;
    background: linear-gradient(180deg, #ffffff 0%, var(--steel) 35%, var(--gold) 75%, var(--flame) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 2px 18px rgba(232,56,13,0.45));
  }
  .sub{ color:var(--text-muted); font-size:12px; letter-spacing:0.06em; max-width:560px; margin:0 auto; line-height:1.6; }
  .sub strong{ color:var(--flame); font-weight:600; }

  /* ---------- Thanh trạng thái tự động (không cần chọn thủ công) ---------- */
  .status-bar{
    max-width:1180px; margin:0 auto 34px; position:relative; z-index:1; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.06em; color:var(--text-muted);
  }
  .status-bar strong{ color:var(--gold); }

  .panel-actions{ display:flex; flex-wrap:wrap; gap:14px; margin-top:28px; justify-content:center; }
  .action-btn{
    font-family:'Anton', sans-serif; font-size:14px; letter-spacing:0.05em; text-transform:uppercase;
    color:var(--gold); background:rgba(255,255,255,0.03); border:1px solid rgba(244,211,94,0.4);
    padding:12px 24px; border-radius:30px; cursor:pointer; transition: all 0.25s ease;
  }
  .action-btn:hover{ background:rgba(232,56,13,0.14); border-color:var(--flame); color:var(--flame); }
  .action-btn.primary{
    color:var(--void); background:linear-gradient(135deg, var(--gold), var(--flame)); border-color:transparent;
    box-shadow: 0 8px 24px -8px rgba(232,56,13,0.6);
  }
  .action-btn.primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .action-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none !important; filter:none !important; }

  /* ---------- Table / deck area ---------- */
  .table-area{
    max-width:1180px; margin:0 auto; position:relative; z-index:1; min-height:280px;
    background: radial-gradient(ellipse 700px 300px at 50% 40%, rgba(232,56,13,0.10), transparent 70%);
    border-radius:18px; padding:40px 20px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .table-hint{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.06em; color:var(--text-muted);
    text-align:center; margin: 22px 0 0;
  }

  .deck-stack{ position:relative; width:var(--card-w); aspect-ratio:var(--card-ratio); margin:0 auto; }
  .deck-card{
    position:absolute; inset:0; border-radius:var(--radius); overflow:hidden;
    box-shadow: 0 0 0 1px rgba(244,211,94,0.5), 0 14px 26px -10px rgba(0,0,0,0.75);
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
  }
  .deck-card.shuffling{ transition: transform 0.28s cubic-bezier(.3,.7,.3,1); }

  .spread-grid{
    display:flex; flex-wrap:wrap; justify-content:center; gap:22px 18px; max-width:1080px; margin:0 auto;
  }
  .spread-slot{
    width:var(--card-w); aspect-ratio:var(--card-ratio); position:relative; cursor:pointer;
    opacity:0; transform: translateY(40px) scale(0.7) rotate(0deg);
    animation: slotFlyIn 0.55s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes slotFlyIn{ to{ opacity:1; transform: translateY(0) scale(1) rotate(var(--tilt,0deg)); } }
  .spread-slot .card-back-face{
    position:relative; width:100%; height:100%; border-radius:var(--radius); overflow:hidden;
    box-shadow: 0 0 0 1px rgba(244,211,94,0.5), 0 0 18px rgba(232,56,13,0.3), 0 10px 20px -8px rgba(0,0,0,0.7);
    transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease;
  }
  .spread-slot:not(.disabled):hover .card-back-face{
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 0 0 1px rgba(244,211,94,0.85), 0 0 30px rgba(232,56,13,0.55), 0 22px 34px -10px rgba(0,0,0,0.85);
  }
  .spread-slot.disabled{ cursor:default; }
  .spread-slot.disabled .card-back-face{ opacity:0.32; filter:grayscale(0.4); }
  .spread-slot.picked .card-back-face{ opacity:1; filter:none; box-shadow: 0 0 0 2px var(--flame), 0 0 22px rgba(255,138,30,0.65); }

  /* mặt sau thẻ: dùng ảnh do bạn tự chèn (BACK_IMG), hoặc hoạ tiết mặc định nếu để trống */
  .art-back{ position:absolute; inset:0; background-size:cover; background-position:center; background-color:var(--iron); }
  .art-back.default-back{
    background-image:
      repeating-linear-gradient(45deg, rgba(244,211,94,0.09) 0 7px, transparent 7px 15px),
      radial-gradient(circle at 50% 46%, rgba(255,138,30,0.4), transparent 62%),
      linear-gradient(160deg, #241a14, var(--ember-deep) 55%, #1a1512);
    display:flex; align-items:center; justify-content:center;
  }
  .art-back.default-back::before{
    content:"◆"; font-size:34%; color:var(--gold); opacity:0.55; text-shadow:0 0 14px rgba(255,138,30,0.6);
  }
  .art-back.default-back::after{
    content:"HÀNH TRÌNH 2026"; position:absolute; bottom:8%; left:0; right:0; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-size:8.5%; letter-spacing:0.12em; color:var(--gold-dim);
  }

  /* ---------- Reveal overlay (dựa trên hiệu ứng xem-the.html, kéo dài & hồi hộp hơn) ---------- */
  .reveal-overlay{
    position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse 1200px 900px at 50% 30%, rgba(60,16,8,0.55), transparent 65%), rgba(4,2,1,0.92);
    backdrop-filter: blur(3px);
  }
  .reveal-overlay[hidden]{ display:none; }
  .reveal-overlay .bg-crop{ position:fixed; inset:0; overflow:hidden; z-index:0; opacity:0; transition:opacity 1s ease; }
  .reveal-overlay .bg-crop.show{ opacity:1; }
  .reveal-overlay .bg-img{
    position:absolute; inset:-60px; background-size:cover; background-position:center;
    filter: blur(26px) saturate(1.3) brightness(0.7); transform: scale(1.12);
  }

  .reveal-top{
    position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding: max(16px, env(safe-area-inset-top)) 20px 16px; z-index:10;
  }
  .close-btn{
    display:inline-flex; align-items:center; gap:8px; background:rgba(10,5,3,0.5); backdrop-filter: blur(6px);
    border:1px solid rgba(244,211,94,0.4); color:var(--gold); font-family:'IBM Plex Mono', monospace;
    font-size:12px; letter-spacing:0.06em; text-transform:uppercase; padding:9px 16px; border-radius:30px;
    cursor:pointer; transition: all 0.25s ease;
  }
  .close-btn:hover{ background: rgba(232,56,13,0.18); border-color: var(--flame); color: var(--flame); }
  .draw-status{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--text-muted); text-align:right; min-height:16px;
  }
  .draw-status.tense{ color:var(--flame); animation: statusPulse 0.5s ease-in-out infinite alternate; }
  @keyframes statusPulse{ from{ opacity:0.55; } to{ opacity:1; } }

  .stage{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; perspective:1000px; touch-action:none; gap:26px; }

  .charge-glow{
    position:absolute; left:50%; top:50%; width:var(--card-w-r, 320px); aspect-ratio:1/1;
    transform:translate(-50%,-50%) scale(1); border-radius:50%;
    background: radial-gradient(circle, rgba(255,180,90,0.9), rgba(255,138,30,0.35) 40%, transparent 70%);
    opacity:0; pointer-events:none; z-index:-1; filter:blur(6px);
  }

  .card-wrap{
    position:relative; width: clamp(220px, 58vw, 380px); aspect-ratio: var(--card-ratio);
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.55)) drop-shadow(0 35px 50px rgba(0,0,0,0.65));
  }
  .card-wrap.intro{ animation: introDrop 0.85s cubic-bezier(.22,.85,.3,1) both; }
  @keyframes introDrop{
    0%{ opacity:0; transform: translateY(-46px) scale(0.82) rotateZ(-4deg); }
    55%{ opacity:1; transform: translateY(3px) scale(1.045) rotateZ(1.5deg); }
    78%{ transform: translateY(-1px) scale(0.985) rotateZ(-0.5deg); }
    100%{ opacity:1; transform: translateY(0) scale(1) rotateZ(0deg); }
  }
  .card-wrap.shaking{ animation: cardShake 0.32s ease-in-out infinite; }
  @keyframes cardShake{
    0%,100%{ transform: rotateZ(0deg) translateX(0); }
    25%{ transform: rotateZ(-1.6deg) translateX(-2px); }
    75%{ transform: rotateZ(1.6deg) translateX(2px); }
  }

  .reveal-flash{
    position:absolute; inset:0; border-radius: var(--radius);
    background: radial-gradient(circle at 50% 62%,
      rgba(255,200,110,0.95) 0%, rgba(255,138,30,0.7) 26%, rgba(232,56,13,0.45) 46%,
      rgba(244,211,94,0.15) 62%, transparent 76%);
    opacity:0; pointer-events:none; mix-blend-mode: screen; z-index:3;
  }
  .reveal-flash.play{ animation: revealFlash 1.5s ease-out both; }
  @keyframes revealFlash{
    0%{ opacity:0; transform:scale(0.5); filter:brightness(1.3) saturate(1.1); }
    28%{ opacity:1; transform:scale(1.08); filter:brightness(1.7) saturate(1.3); }
    100%{ opacity:0; transform:scale(1.6); filter:brightness(1) saturate(1); }
  }
  .shockwave{
    position:absolute; inset:-8%; border-radius: var(--radius); border: 3px solid rgba(255,180,90,0.85);
    box-shadow: 0 0 24px 6px rgba(255,138,30,0.55), inset 0 0 20px 4px rgba(255,138,30,0.35);
    opacity:0; pointer-events:none; z-index:2;
  }
  .shockwave.play{ animation: shockwaveExpand 1.05s ease-out both; }
  @keyframes shockwaveExpand{
    0%{ opacity:0.95; transform:scale(0.6); }
    65%{ opacity:0.4; }
    100%{ opacity:0; transform:scale(1.85); }
  }
  .ember{
    position:absolute; bottom:8%; width:5px; height:5px; border-radius:50%;
    background: radial-gradient(circle, var(--gold) 0%, var(--flame) 55%, transparent 78%);
    box-shadow: 0 0 6px 1px rgba(255,138,30,0.8); opacity:0; pointer-events:none;
    animation: emberRise 1.4s ease-out both;
  }
  .ember.big{ width:8px; height:8px; box-shadow: 0 0 10px 2px rgba(255,138,30,0.85); }
  @keyframes emberRise{
    0%{ opacity:0; transform: translate(0,0) scale(0.6); }
    16%{ opacity:1; } 70%{ opacity:0.8; }
    100%{ opacity:0; transform: translate(var(--drift, 0px), -160px) scale(0.15); }
  }
  .reveal-burst{
    position:fixed; inset:0; z-index:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0;
  }
  .reveal-burst.play{ animation: burstFade 1.1s ease-out both; }
  .reveal-burst::before{
    content:''; width:150vmax; height:150vmax;
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,138,30,0.55) 4deg, transparent 10deg,
      transparent 28deg, rgba(244,211,94,0.4) 32deg, transparent 38deg,
      transparent 55deg, rgba(232,56,13,0.5) 59deg, transparent 65deg,
      transparent 85deg, rgba(255,138,30,0.55) 89deg, transparent 95deg,
      transparent 112deg, rgba(244,211,94,0.4) 116deg, transparent 122deg,
      transparent 140deg, rgba(232,56,13,0.5) 144deg, transparent 150deg,
      transparent 170deg, rgba(255,138,30,0.55) 174deg, transparent 180deg,
      transparent 198deg, rgba(244,211,94,0.4) 202deg, transparent 208deg,
      transparent 225deg, rgba(232,56,13,0.5) 229deg, transparent 235deg,
      transparent 255deg, rgba(255,138,30,0.55) 259deg, transparent 265deg,
      transparent 282deg, rgba(244,211,94,0.4) 286deg, transparent 292deg,
      transparent 310deg, rgba(232,56,13,0.5) 314deg, transparent 320deg,
      transparent 340deg, rgba(255,138,30,0.55) 344deg, transparent 350deg,
      transparent 360deg);
  }
  .reveal-burst.play::before{ animation: burstSpin 1.1s cubic-bezier(.15,.7,.3,1) both; }
  @keyframes burstFade{ 0%{ opacity:0; } 18%{ opacity:1; } 100%{ opacity:0; } }
  @keyframes burstSpin{ 0%{ transform: scale(0.04) rotate(0deg); } 100%{ transform: scale(1) rotate(28deg); } }

  .card-inner{ position:relative; width:100%; height:100%; transform-style:preserve-3d; will-change:transform; }
  .card-shadow{
    position:absolute; left:6%; right:6%; bottom:-9%; height:16%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.72), transparent 72%);
    filter: blur(16px); transform: translateZ(-40px); pointer-events:none;
  }
  .card-face{
    position:relative; width:100%; height:100%; border-radius: var(--radius); overflow:hidden;
    background: var(--iron); padding:4px; transform: translateZ(calc(var(--card-depth) / 2));
    box-shadow:
      0 0 0 2px rgba(244,211,94,0.8), 0 0 0 3.5px rgba(10,5,3,0.55),
      0 0 44px rgba(232,56,13,0.4), 0 22px 44px -14px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -2px 3px rgba(0,0,0,0.35),
      inset 2px 0 3px rgba(255,255,255,0.15), inset -2px 0 3px rgba(0,0,0,0.25);
    background-image: linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
  }
  .card-art{ width:100%; height:100%; border-radius: calc(var(--radius) - 2px); overflow:hidden; position:relative; background: var(--iron); }
  .card-art .art{ position:absolute; inset:0; background-size:cover; background-position:center; transition: filter 0.15s ease; }

  .holo-sheen{
    position:absolute; inset:4px; border-radius: calc(var(--radius) - 1px);
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background:
      repeating-linear-gradient(115deg, rgba(255,46,151,0.5) 0%, rgba(255,196,0,0.5) 9%, rgba(84,255,196,0.5) 18%, rgba(63,150,255,0.5) 27%, rgba(198,63,255,0.5) 36%, rgba(255,46,151,0.5) 45%),
      repeating-linear-gradient(25deg, transparent 0%, rgba(255,255,255,0.09) 3%, transparent 6%);
    background-size:260% 260%, 34% 34%; mix-blend-mode: screen; opacity:0.3; pointer-events:none;
  }
  .holo-glare{
    position:absolute; inset:4px; border-radius: calc(var(--radius) - 1px);
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background: radial-gradient(circle at var(--gx,50%) var(--gy,50%), rgba(255,255,255,0.95) 0%, rgba(255,222,244,0.55) 6%, rgba(190,222,255,0.28) 15%, transparent 34%);
    mix-blend-mode: overlay; opacity:0; pointer-events:none;
  }
  .holo-edge{
    position:absolute; inset:0; border-radius: var(--radius);
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35);
    opacity: var(--edge-op, 0); pointer-events:none; mix-blend-mode:overlay;
  }
  .card-grain{
    position:absolute; inset:0; border-radius: calc(var(--radius) - 1px);
    transform: translateZ(calc(var(--card-depth) / 2 + 2px)); opacity:0.05; mix-blend-mode: overlay; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .card-back{
    position:absolute; inset:0; border-radius: var(--radius);
    background-image: linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
    filter: brightness(0.45) saturate(0.9); transform: translateZ(calc(var(--card-depth) / -2)); pointer-events:none;
  }
  .card-side{ position:absolute; background-image: linear-gradient(90deg, #d7dbe0 0%, #8a8f96 35%, #f4ecd6 55%, #8a8f96 80%, #d7dbe0 100%); filter: brightness(0.5); pointer-events:none; }
  .side-right, .side-left{ top:0; width: var(--card-depth); height:100%; }
  .side-top, .side-bottom{ left:0; height: var(--card-depth); width:100%; }
  .side-right{ left: calc(100% - var(--card-depth) / 2); transform: rotateY(90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-left{ left: calc(var(--card-depth) / -2); transform: rotateY(-90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-top{ top: calc(var(--card-depth) / -2); transform: rotateX(-90deg) translateZ(calc(var(--card-depth) / 2)); }
  .side-bottom{ top: calc(100% - var(--card-depth) / 2); transform: rotateX(90deg) translateZ(calc(var(--card-depth) / 2)); }
  .shine-sweep{
    position:absolute; inset:4px; border-radius: calc(var(--radius) - 1px);
    transform: translateZ(calc(var(--card-depth) / 2 + 2px));
    background: linear-gradient(75deg, transparent 32%, rgba(255,255,255,0.5) 46%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.5) 54%, transparent 68%);
    background-size:240% 240%; mix-blend-mode: overlay; opacity:0.6; pointer-events:none;
  }
  .sparkle-layer{ position:absolute; inset:0; border-radius: calc(var(--radius) - 1px); overflow:hidden; pointer-events:none; transform: translateZ(calc(var(--card-depth) / 2 + 3px)); }
  .sparkle{
    position:absolute; width:6px; height:6px; margin:-3px 0 0 -3px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.7) 45%, transparent 72%);
    border-radius:50%; opacity:0; animation: sparklePop 850ms ease-out forwards;
  }
  @keyframes sparklePop{ 0%{ opacity:0; transform:scale(0.2); } 30%{ opacity:1; transform:scale(1.4); } 100%{ opacity:0; transform:scale(0.3); } }

  .reveal-label{
    position:relative; z-index:1; text-align:center; opacity:0; transform:translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease; min-height:20px;
  }
  .reveal-label.show{ opacity:1; transform:translateY(0); }
  .reveal-label .num{
    display:inline-block; font-family:'Anton', sans-serif; font-size:12px; color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame)); padding:4px 11px; border-radius:4px; letter-spacing:0.06em; margin-bottom:8px;
  }
  .reveal-label .title{

<script>
/* ============================================================
   CẤU HÌNH — chỉnh ở đây
   ============================================================ */

// Ảnh mặt sau thẻ. Để trống "" để dùng hoạ tiết mặc định có sẵn.
const BACK_IMG = "";

// Danh sách các trang công diễn dùng làm nguồn dữ liệu thẻ.
// Thêm / bớt / đổi tên tuỳ theo các trang bạn đã có.
const SOURCE_PAGES = [
  { file: "cong-dien-hoi-ngo.html", label: "Công Diễn Hội Ngộ" },
  { file: "cong-dien-1.html",       label: "Công Diễn 1" },
  { file: "cong-dien-2.html",       label: "Công Diễn 2" },
  { file: "cong-dien-3.html",       label: "Công Diễn 3" },
  { file: "cong-dien-4.html",       label: "Công Diễn 4" },
  { file: "cong-dien-5.html",       label: "Công Diễn 5" },
  { file: "chung-ket.html",         label: "Chung Kết" },
];

/* ============================================================
   TẢI & GỘP DỮ LIỆU THẺ TỪ CÁC TRANG CÔNG DIỄN
   ============================================================ */

let ALL_CARDS = []; // chỉ gồm những thẻ đã xác nhận có ảnh thật, tải được

async function fetchPageCards(src){
  try{
    const res = await fetch(src.file, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, 'text/html');
    const titleMap = {};
    doc.querySelectorAll('.muc-block').forEach(block => {
      const numEl = block.querySelector('.collection-num');
      const titleEl = block.querySelector('.collection-title');
      if(numEl && titleEl){
        const n = parseInt(numEl.textContent.trim(), 10);
        if(!isNaN(n)) titleMap[n] = titleEl.textContent.trim();
      }
    });

    const m = html.match(/const\s+CARDS\s*=\s*(\[[\s\S]*?\])\s*;/);
    if(!m) return [];

    let arr;
    try{
      arr = Function('"use strict"; return (' + m[1] + ');')();
    }catch(e){
      console.warn('Không đọc được mảng CARDS trong', src.file, e);
      return [];
    }

    return arr.map(c => ({
      img: c.img,
      muc: c.muc,
      mucTitle: titleMap[c.muc] || ('Mục ' + c.muc),
      pageLabel: src.label,
      pageFile: src.file
    }));
  }catch(err){
    console.warn('Bỏ qua nguồn (không tải được):', src.file, err.message);
    return [];
  }
}

// Thử tải thật sự 1 ảnh thẻ; chỉ coi là "ảnh thật" nếu tải thành công.
function testImageReal(src, timeoutMs = 8000){
  return new Promise(resolve => {
    if(!src){ resolve(false); return; }
    const img = new Image();
    let done = false;
    const finish = (ok) => { if(!done){ done = true; clearTimeout(timer); resolve(ok); } };
    const timer = setTimeout(() => finish(false), timeoutMs);
    img.onload = () => finish(img.naturalWidth > 0 && img.naturalHeight > 0);
    img.onerror = () => finish(false);
    img.src = src;
  });
}

async function loadAllCards(){
  const statusText = document.getElementById('statusText');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const spreadBtn = document.getElementById('spreadBtn');
  const hint = document.getElementById('tableHint');

  const results = await Promise.all(SOURCE_PAGES.map(fetchPageCards));
  const rawCards = results.flat();

  if(rawCards.length === 0){
    statusText.textContent = 'Không tải được dữ liệu thẻ nào.';
    hint.textContent = 'Hãy chắc chắn trang này đang được mở qua server (không phải mở trực tiếp file), và các trang công diễn nằm cùng thư mục.';
    return;
  }

  statusText.textContent = `Đang kiểm tra ${rawCards.length} ảnh thẻ…`;

  const checks = await Promise.all(rawCards.map(c => testImageReal(c.img)));
  ALL_CARDS = rawCards.filter((c, i) => checks[i]);

  if(ALL_CARDS.length === 0){
    statusText.textContent = 'Không tìm thấy thẻ nào có ảnh thật.';
    hint.textContent = 'Kiểm tra lại đường dẫn ảnh trong các trang công diễn.';
    return;
  }

  statusText.innerHTML = `Đã nhận diện <strong>${ALL_CARDS.length}</strong> thẻ có ảnh thật trên <strong>${new Set(ALL_CARDS.map(c => c.pageFile)).size}</strong> công diễn.`;
  hint.textContent = 'Nhấn "Xáo Bài" rồi "Trải Bài" để bắt đầu…';

  shuffleBtn.disabled = false;
  spreadBtn.disabled = false;
  buildDeckStack();
}

/* ============================================================
   HOẠ TIẾT MẶT SAU THẺ
   ============================================================ */

function applyBackArt(el){
  if(BACK_IMG){
    el.classList.remove('default-back');
    el.style.backgroundImage = `url('${BACK_IMG}')`;
  } else {
    el.classList.add('default-back');
    el.style.backgroundImage = '';
  }
}

/* ============================================================
   BỘ BÀI (trước khi trải) — hiệu ứng xáo bài
   ============================================================ */

function buildDeckStack(){
  const stack = document.getElementById('deckStack');
  stack.innerHTML = '';
  const n = 5;
  for(let i = 0; i < n; i++){
    const card = document.createElement('div');
    card.className = 'deck-card';
    const back = document.createElement('div');
    back.className = 'art-back';
    applyBackArt(back);
    card.appendChild(back);
    const offset = (i - (n - 1) / 2);
    card.style.transform = `translate(${offset * 3}px, ${-offset * 2}px) rotate(${offset * 2.2}deg)`;
    card.style.zIndex = i;
    stack.appendChild(card);
  }
}

let shuffled = false;

function shuffleDeck(){
  const cards = Array.from(document.querySelectorAll('#deckStack .deck-card'));
  if(cards.length === 0) return Promise.resolve();
  cards.forEach(c => c.classList.add('shuffling'));

  let rounds = 0;
  const maxRounds = 6;

  return new Promise(resolve => {
    const step = () => {
      cards.forEach(c => {
        const rx = (Math.random() - 0.5) * 46;
        const ry = (Math.random() - 0.5) * 18;
        const rot = (Math.random() - 0.5) * 24;
        c.style.transform = `translate(${rx}px, ${ry}px) rotate(${rot}deg)`;
      });
      playTick(600 + rounds * 60);
      rounds++;
      if(rounds < maxRounds){
        setTimeout(step, 190);
      } else {
        setTimeout(() => {
          buildDeckStack();
          cards.forEach(c => c.classList.remove('shuffling'));
          shuffled = true;
          document.getElementById('tableHint').textContent = 'Đã xáo xong! Nhấn "Trải Bài" để chọn thẻ.';
          resolve();
        }, 220);
      }
    };
    step();
  });
}

/* ============================================================
   TRẢI BÀI
   ============================================================ */

let drawPool = [];     // các thẻ (đã ẩn mặt) của lượt trải hiện tại
let pickedIndexes = new Set();
let revealing = false;

function sampleCards(pool, n){
  const arr = pool.slice();
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n);
}

function spreadCards(){
  if(ALL_CARDS.length === 0){
    document.getElementById('tableHint').textContent = 'Chưa nhận diện được thẻ nào có ảnh thật.';
    return;
  }

  // Trải toàn bộ số thẻ đã tự động nhận diện được (xáo ngẫu nhiên thứ tự).
  drawPool = sampleCards(ALL_CARDS, ALL_CARDS.length);
  pickedIndexes = new Set();

  const deckStack = document.getElementById('deckStack');
  const grid = document.getElementById('spreadGrid');
  const hint = document.getElementById('tableHint');

  deckStack.style.display = 'none';
  grid.hidden = false;
  grid.innerHTML = '';
  hint.textContent = `Đã trải ${drawPool.length} thẻ — chọn một lá bất kỳ…`;

  drawPool.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'spread-slot';
    slot.dataset.index = i;
    slot.style.setProperty('--tilt', ((Math.random() - 0.5) * 6).toFixed(1) + 'deg');
    slot.style.animationDelay = (i * 0.035) + 's';

    const face = document.createElement('div');
    face.className = 'card-back-face';
    const back = document.createElement('div');
    back.className = 'art-back';
    applyBackArt(back);
    face.appendChild(back);
    slot.appendChild(face);

    slot.addEventListener('click', () => pickCard(i));
    grid.appendChild(slot);
  });
}

function pickCard(index){
  if(revealing) return;
  if(pickedIndexes.has(index)) return;

  const slots = document.querySelectorAll('.spread-slot');
  slots.forEach(s => {
    if(parseInt(s.dataset.index, 10) !== index) s.classList.add('disabled');
  });
  slots[index].classList.add('picked');

  pickedIndexes.add(index);
  const chosen = drawPool[index];
  openReveal(chosen);
}

/* ============================================================
   REVEAL — hiệu ứng mở thẻ kéo dài, hồi hộp
   ============================================================ */

const overlay = document.getElementById('revealOverlay');
const cardWrap = document.getElementById('cardWrap');
const cardInner = document.getElementById('cardInner');
const cardArt = document.getElementById('cardArt');
const chargeGlow = document.getElementById('chargeGlow');
const revealFlash = document.getElementById('revealFlash');
const shockwave = document.getElementById('shockwave');
const revealBurst = document.getElementById('revealBurst');
const drawStatus = document.getElementById('drawStatus');
const revealLabel = document.getElementById('revealLabel');
const revealTitle = document.getElementById('revealTitle');
const revealSource = document.getElementById('revealSource');
const revealActions = document.getElementById('revealActions');
const revealHint = document.getElementById('revealHint');
const bgCrop = document.getElementById('bgCrop');
const bgImg = document.getElementById('bgImg');
const sparkleLayer = document.getElementById('sparkleLayer');
const holoSheen = document.getElementById('holoSheen');
const holoGlare = document.getElementById('holoGlare');
const holoEdge = document.getElementById('holoEdge');
const shineSweep = document.getElementById('shineSweep');
const stage = document.getElementById('stage');

function replay(el, className){
  el.classList.remove(className);
  void el.offsetWidth;
  el.classList.add(className);
}

function resetRevealVisuals(){
  cardWrap.classList.remove('intro', 'shaking');
  revealFlash.classList.remove('play');
  shockwave.classList.remove('play');
  revealBurst.classList.remove('play');
  revealLabel.classList.remove('show');
  revealActions.classList.remove('show');
  revealHint.classList.remove('show');
  bgCrop.classList.remove('show');
  chargeGlow.style.opacity = 0;
  chargeGlow.style.transform = 'translate(-50%,-50%) scale(1)';
  drawStatus.classList.remove('tense');
  drawStatus.textContent = '';
  cardArt.style.filter = 'none';
}

function openReveal(chosen){
  revealing = true;
  resetRevealVisuals();
  overlay.hidden = false;
  document.body.style.overflow = 'hidden';

  // Bắt đầu bằng mặt sau thẻ (giống các thẻ đang úp trên bàn)
  cardArt.classList.remove('default-back');
  if(BACK_IMG){
    cardArt.style.backgroundImage = `url('${BACK_IMG}')`;
  } else {
    cardArt.style.backgroundImage = '';
    cardArt.classList.add('default-back');
  }

  cardWrap.classList.add('intro');
  drawStatus.textContent = 'Đang rút thẻ…';
  drawStatus.classList.add('tense');

  setTimeout(() => {
    revealHint.classList.add('show');
    runSuspenseSpin(chosen);
  }, 500);
}

function playTick(freq){
  if(!soundEnabled) return;
  const ctx = ensureAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.16);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.16);
}

function playBigChime(){
  if(!soundEnabled) return;
  const ctx = ensureAudioCtx();
  [0, 0.08, 0.16].forEach((delay, idx) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900 + idx * 300, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(0.07, ctx.currentTime + delay + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + 0.6);
    osc.connect(gain).connect(ctx.destination);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + 0.6);
  });
}

function runSuspenseSpin(chosen){
  const candidatePool = drawPool.length > 1 ? drawPool : ALL_CARDS;
  const totalTicks = 16;
  let tick = 0;

  // độ trễ tăng dần: bắt đầu nhanh (hồi hộp) rồi chậm lại từ từ (kéo căng)
  const delays = [];
  for(let i = 0; i < totalTicks; i++){
    const progress = i / (totalTicks - 1);
    const eased = Math.pow(progress, 2.4);
    delays.push(70 + eased * 340);
  }

  function step(){
    if(tick >= totalTicks){
      settleOnCard(chosen);
      return;
    }
    const progress = tick / (totalTicks - 1);
    const randomCard = candidatePool[Math.floor(Math.random() * candidatePool.length)];
    cardArt.classList.remove('default-back');
    cardArt.style.backgroundImage = `url('${randomCard.img}')`;
    cardArt.style.filter = `brightness(${1 + progress * 0.15}) saturate(${1 + progress * 0.1})`;

    chargeGlow.style.opacity = (progress * 0.85).toFixed(2);
    chargeGlow.style.transform = `translate(-50%,-50%) scale(${1 + progress * 0.5})`;

    if(progress > 0.6) cardWrap.classList.add('shaking');

    playTick(500 + progress * 700);

    tick++;
    setTimeout(step, delays[tick] || 380);
  }

  drawStatus.textContent = 'Định mệnh đang chọn…';
  step();
}

function settleOnCard(chosen){
  cardWrap.classList.remove('shaking');
  cardArt.classList.remove('default-back');
  cardArt.style.filter = 'none';
  cardArt.style.backgroundImage = `url('${chosen.img}')`;

  chargeGlow.style.opacity = 0;

  drawStatus.textContent = 'Đã lộ diện!';
  setTimeout(() => drawStatus.classList.remove('tense'), 50);

  replay(revealFlash, 'play');
  replay(shockwave, 'play');
  replay(revealBurst, 'play');
  playBigChime();

  bgImg.style.backgroundImage = `url('${chosen.img}')`;
  bgCrop.classList.add('show');

  revealTitle.textContent = chosen.mucTitle;
  revealSource.textContent = 'Công diễn: ' + chosen.pageLabel;

  setTimeout(() => {
    revealLabel.classList.add('show');
    revealActions.classList.add('show');
    revealing = false;
  }, 350);
}

function closeReveal(){
  overlay.hidden = true;
  document.body.style.overflow = '';
  drawStatus.textContent = '';
}

document.getElementById('closeOverlayBtn').addEventListener('click', closeReveal);
document.getElementById('doneBtn').addEventListener('click', closeReveal);
document.getElementById('againBtn').addEventListener('click', () => {
  closeReveal();
  const remaining = drawPool.map((_, i) => i).filter(i => !pickedIndexes.has(i));
  if(remaining.length === 0){
    document.getElementById('tableHint').textContent = 'Đã rút hết các thẻ đã trải. Nhấn "Trải Bài" để tiếp tục.';
  } else {
    document.getElementById('tableHint').textContent = `Còn ${remaining.length} thẻ trên bàn — chọn tiếp một lá khác.`;
  }
});

/* ---------- Nút bật/tắt âm thanh ---------- */
let audioCtx = null;
let soundEnabled = false;
function ensureAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
document.getElementById('soundToggle').addEventListener('click', function(){
  soundEnabled = !soundEnabled;
  this.setAttribute('aria-pressed', String(soundEnabled));
  this.textContent = soundEnabled ? '🔊' : '🔇';
  this.title = soundEnabled ? 'Tắt âm thanh' : 'Bật âm thanh';
  if(soundEnabled) ensureAudioCtx();
});

/* ---------- Hiệu ứng nghiêng / hologram (giữ như xem-the.html) ---------- */
function spawnSparkle(){
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = (8 + Math.random() * 84) + '%';
  el.style.top = (8 + Math.random() * 84) + '%';
  el.style.animationDuration = (650 + Math.random() * 500) + 'ms';
  sparkleLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;
let targetPX = 50, targetPY = 50, curPX = 50, curPY = 50;
let targetGlow = 0, curGlow = 0;
let targetScale = 1, curScale = 1;
let pointerActive = false;
let idleT = Math.random() * 10;
let jitterX = 0, jitterY = 0;

function onPointerMove(e){
  const rect = cardInner.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = (e.clientX - cx) / (rect.width / 2);
  let dy = (e.clientY - cy) / (rect.height / 2);
  dx = Math.max(-1, Math.min(1, dx));
  dy = Math.max(-1, Math.min(1, dy));
  targetRY = dx * 24;
  targetRX = dy * -19;
  targetPX = 50 + dx * 42;
  targetPY = 50 + dy * 42;
  targetGlow = 0.6;
  targetScale = 1.045;
  pointerActive = true;
}
function onPointerLeave(){
  pointerActive = false;
  targetGlow = 0;
  targetScale = 1;
}
stage.addEventListener('pointermove', onPointerMove);
stage.addEventListener('pointerleave', onPointerLeave);
stage.addEventListener('pointercancel', onPointerLeave);
stage.addEventListener('pointerdown', onPointerMove);

const cardShadowEl = document.querySelector('.card-shadow');

function loop(){
  if(!pointerActive){
    idleT += 0.008;
    jitterX += (Math.random() - 0.5) * 0.5;
    jitterY += (Math.random() - 0.5) * 0.5;
    jitterX *= 0.94;
    jitterY *= 0.94;
    targetRY = Math.sin(idleT) * 13 + jitterX;
    targetRX = Math.cos(idleT * 0.7) * 6 + jitterY;
    targetPX = 50 + Math.sin(idleT) * 20;
    targetPY = 50 + Math.cos(idleT * 0.8) * 20;
    targetGlow = 0.22 + Math.sin(idleT * 1.3) * 0.1;
    targetScale = 1;
  }

  curRX += (targetRX - curRX) * 0.09;
  curRY += (targetRY - curRY) * 0.09;
  curPX += (targetPX - curPX) * 0.08;
  curPY += (targetPY - curPY) * 0.08;
  curGlow += (targetGlow - curGlow) * 0.08;
  curScale += (targetScale - curScale) * 0.08;

  if(!overlay.hidden){
    cardInner.style.transform = `scale(${curScale}) rotateX(${curRX}deg) rotateY(${curRY}deg)`;
    cardShadowEl.style.transform = `translateZ(-40px) translateX(${curRY * -1.6}px) translateY(${curRX * 1.2}px) scale(${1 - Math.abs(curRY) * 0.006}, ${1 - Math.abs(curRX) * 0.006})`;
    holoSheen.style.backgroundPosition = `${curPX}% ${curPY}%, ${100 - curPX}% ${100 - curPY}%`;
    shineSweep.style.backgroundPosition = `${curPX}% ${curPY}%`;
    if(!revealing && curGlow > 0.42 && Math.random() < curGlow * 0.05){
      spawnSparkle();
      playTick(1200 + Math.random() * 500);
    }
    holoGlare.style.setProperty('--gx', curPX + '%');
    holoGlare.style.setProperty('--gy', curPY + '%');
    holoGlare.style.opacity = curGlow;
    holoEdge.style.setProperty('--edge-op', Math.min(1, curGlow * 1.4));
  }

  requestAnimationFrame(loop);
}
loop();
