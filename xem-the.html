<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Xem Thẻ · Công Diễn Hội Ngộ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0a0503;
    --ember:#e8380d;
    --flame:#ff8a1e;
    --gold:#f4d35e;
    --steel:#d7dbe0;
    --iron:#1a1512;
    --text-light:#f2ece0;
    --text-muted:#a99b8c;
    --card-w: clamp(220px, 58vw, 400px);
    --card-ratio: 1635 / 2048;
    --radius: 4mm;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    height:100%;
    overflow:hidden;
    font-family:'Source Sans 3', sans-serif;
    color:var(--text-light);
  }
  html{
    background:var(--void);
  }
  body{
    background:transparent; /* quan trọng: không đặt nền đặc ở body,
      nếu không nó sẽ vẽ đè lên trên các lớp position:fixed có z-index âm
      (.bg-crop, .bg-overlay) và che mất ảnh nền mờ phía sau */
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* ---------- Nền mờ từ chính ảnh thẻ ---------- */
  .bg-crop{
    position:fixed; inset:0;
    overflow:hidden;
    z-index:-2;
  }
  .bg-img{
    position:absolute;
    inset:-60px;
    background-size:cover;
    background-position:center;
    filter: blur(22px) saturate(1.3) brightness(1.15);
    transform: scale(1.12);
  }
  .bg-overlay{
    position:fixed; inset:0;
    z-index:-1;
    background:
      radial-gradient(ellipse 900px 700px at 50% 0%, rgba(232,56,13,0.1), transparent 62%),
      radial-gradient(ellipse 1000px 900px at 100% 100%, rgba(0,0,0,0.14), transparent 60%),
      linear-gradient(180deg, rgba(10,5,3,0.05) 0%, rgba(5,2,1,0.16) 60%, rgba(5,2,1,0.26) 100%);
  }

  /* ---------- Top bar ---------- */
  .top-bar{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding: max(16px, env(safe-area-inset-top)) 20px 16px;
    z-index:10;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--btn-bg, rgba(10,5,3,0.4));
    backdrop-filter: blur(6px);
    border:1px solid var(--btn-border, rgba(244,211,94,0.4));
    color: var(--btn-text, var(--gold));
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:9px 16px;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    transition: all 0.25s ease, background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
  }
  .back-btn:hover{
    background: var(--btn-bg-hover, rgba(232,56,13,0.18));
    border-color: var(--flame);
    color: var(--flame);
  }
  /* Nền tối (ảnh sáng màu) -> khung/nút đậm hơn để nổi trên nền sáng */
  .back-btn.is-light{
    --btn-bg: rgba(10,5,3,0.55);
    --btn-border: rgba(10,5,3,0.55);
    --btn-text: #f7f1e4;
    --btn-bg-hover: rgba(10,5,3,0.72);
  }
  /* Nền sáng (ảnh tối màu) -> khung/nút giữ kiểu kính mờ vàng như gốc */
  .back-btn.is-dark{
    --btn-bg: rgba(10,5,3,0.4);
    --btn-border: rgba(244,211,94,0.45);
    --btn-text: var(--gold);
    --btn-bg-hover: rgba(232,56,13,0.18);
  }
  .label{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    line-height:1.5;
  }
  .label .num{
    order:2;
    display:inline-block;
    font-family:'Anton', sans-serif;
    color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    padding:3px 9px;
    border-radius:3px;
    letter-spacing:0.05em;
  }
  .label .title{
    order:1;
    display:block;
    margin-top:0;
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:15px;
    color: var(--label-text, var(--text-light));
    letter-spacing:0.02em;
    text-transform:uppercase;
    text-shadow: var(--label-shadow, 0 2px 10px rgba(0,0,0,0.75));
    transition: color 0.4s ease, text-shadow 0.4s ease;
  }
  /* Nền ảnh sáng màu -> chữ chuyển sang tối để không bị mất chữ */
  .label.is-light .title{
    --label-text:#171310;
    --label-shadow: 0 1px 6px rgba(255,255,255,0.7), 0 0 14px rgba(255,255,255,0.4);
  }
  /* Nền ảnh tối màu -> giữ chữ sáng như gốc */
  .label.is-dark .title{
    --label-text: var(--text-light);
    --label-shadow: 0 2px 10px rgba(0,0,0,0.75);
  }

  /* ---------- Stage / card ---------- */
  .stage{
    position:fixed; inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective: 1000px;
    touch-action:none;
  }

  .card-wrap{
    width:var(--card-w);
    aspect-ratio: var(--card-ratio);
    animation: introDrop 0.9s cubic-bezier(.2,.9,.25,1) both;
    filter:
      drop-shadow(0 8px 10px rgba(0,0,0,0.55))
      drop-shadow(0 35px 50px rgba(0,0,0,0.65));
  }
  @keyframes introDrop{
    from{ opacity:0; transform: translateY(-42px) scale(0.86); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .card-inner{
    position:relative;
    width:100%; height:100%;
    transform-style:preserve-3d;
    will-change:transform;
  }

  .card-shadow{
    position:absolute;
    left:6%; right:6%;
    bottom:-9%;
    height:16%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6), transparent 72%);
    filter: blur(16px);
    transform: translateZ(-40px);
    pointer-events:none;
  }

  .card-face{
    position:relative;
    width:100%; height:100%;
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--iron);
    padding:4px;
    box-shadow:
      0 0 0 1.5px rgba(244,211,94,0.55),
      0 0 40px rgba(232,56,13,0.4),
      0 20px 40px -14px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 3px rgba(0,0,0,0.35),
      inset 2px 0 3px rgba(255,255,255,0.15),
      inset -2px 0 3px rgba(0,0,0,0.25);
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
  }
  .card-art{
    width:100%; height:100%;
    border-radius: calc(var(--radius) - 2px);
    overflow:hidden;
    position:relative;
    background: var(--iron);
  }
  .card-art .art{
    position:absolute; inset:0;
    background-size:cover;
    background-repeat:no-repeat;
    background-position:center;
  }

  /* ---------- Hologram overlays ---------- */
  .holo-sheen{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    background: repeating-linear-gradient(115deg,
      rgba(255,46,151,0.55) 0%,
      rgba(255,196,0,0.55) 9%,
      rgba(84,255,196,0.55) 18%,
      rgba(63,150,255,0.55) 27%,
      rgba(198,63,255,0.55) 36%,
      rgba(255,46,151,0.55) 45%);
    background-size:260% 260%;
    mix-blend-mode: color-dodge;
    opacity:0.4;
    pointer-events:none;
  }
  .holo-glare{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    background: radial-gradient(circle at var(--gx,50%) var(--gy,50%), rgba(255,255,255,0.95), transparent 55%);
    mix-blend-mode: overlay;
    opacity:0;
    pointer-events:none;
  }
  .holo-edge{
    position:absolute; inset:0;
    border-radius: var(--radius);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35);
    opacity: var(--edge-op, 0);
    pointer-events:none;
    mix-blend-mode:overlay;
  }

  .hint{
    position:fixed;
    left:0; right:0;
    bottom: max(22px, env(safe-area-inset-bottom));
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    z-index:5;
    animation: hintFade 5s ease forwards;
    pointer-events:none;
  }
  @keyframes hintFade{
    0%{opacity:0;} 15%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;}
  }

  @media (max-width:560px){
    .label{ display:none; }
  }
</style>
</head>
<body>

  <div class="bg-crop"><div class="bg-img" id="bgImg"></div></div>
  <div class="bg-overlay"></div>

  <div class="top-bar">
    <a class="back-btn is-dark" id="backBtn" href="cong-dien-hoi-ngo.html">← Quay lại bộ sưu tập</a>
    <div class="label is-dark" id="labelBox" style="display:none;">
      <span class="num" id="labelNum"></span>
      <span class="title" id="labelTitle"></span>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="card-wrap">
      <div class="card-inner" id="cardInner">
        <div class="card-shadow"></div>
        <div class="card-face">
          <div class="card-art"><div class="art" id="cardArt"></div></div>
        </div>
        <div class="holo-sheen" id="holoSheen"></div>
        <div class="holo-glare" id="holoGlare"></div>
        <div class="holo-edge" id="holoEdge"></div>
      </div>
    </div>
  </div>

  <div class="hint">Di chuột hoặc chạm để xoay thẻ</div>

<script>
  const params = new URLSearchParams(location.search);
  const imgSrc = params.get('img');
  const title  = params.get('title');
  // 'from' = tên file trang danh sách đã mở thẻ này (VD: cong-dien-3.html).
  // Dùng để nút "Quay lại" luôn trỏ đúng trang gốc, kể cả khi không có lịch sử trình duyệt.
  const fromPage = params.get('from') || 'cong-dien-hoi-ngo.html';

  const backBtnEl = document.getElementById('backBtn');
  backBtnEl.href = fromPage;

  if(!imgSrc){
    location.href = fromPage;
  } else {
    document.getElementById('bgImg').style.backgroundImage = `url('${imgSrc}')`;
    document.getElementById('cardArt').style.backgroundImage = `url('${imgSrc}')`;

    if(title){
      const box = document.getElementById('labelBox');
      box.style.display = '';
      document.getElementById('labelTitle').textContent = title;
    }

    applyAdaptiveTheme(imgSrc);
  }

  // ---------- Tự nhận diện độ sáng nền ảnh để đổi màu chữ/khung sáng-tối ----------
  function averageLuminance(imageData){
    const d = imageData.data;
    let total = 0, count = 0;
    for(let i = 0; i < d.length; i += 4){
      const a = d[i + 3];
      if(a < 10) continue; // bỏ pixel trong suốt
      total += 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
      count++;
    }
    return count ? total / count : 200; // không đọc được -> coi như nền sáng (an toàn)
  }

  function setTheme(el, lum, threshold){
    const isLight = lum > threshold;
    el.classList.toggle('is-light', isLight);
    el.classList.toggle('is-dark', !isLight);
  }

  function applyAdaptiveTheme(src){
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const backEl = document.getElementById('backBtn');
    const labelEl = document.getElementById('labelBox');

    img.onload = () => {
      try{
        const cw = 160;
        const ch = Math.max(1, Math.round(cw * (img.naturalHeight / img.naturalWidth)));
        const canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);

        // Chỉ lấy mẫu dải trên cùng (nơi thanh top-bar phủ lên),
        // chia nửa trái (nút "Quay lại") và nửa phải (tên mục).
        const bandH = Math.max(1, Math.round(ch * 0.22));
        const halfW = Math.round(cw / 2);

        const leftLum  = averageLuminance(ctx.getImageData(0, 0, halfW, bandH));
        const rightLum = averageLuminance(ctx.getImageData(halfW, 0, cw - halfW, bandH));

        const THRESHOLD = 150; // 0-255, nền sáng hơn mức này -> đổi sang chữ/khung tối
        setTheme(backEl, leftLum, THRESHOLD);
        setTheme(labelEl, rightLum, THRESHOLD);
      }catch(err){
        // Canvas bị chặn (CORS khi mở trực tiếp file:// chẳng hạn) -> giữ giao diện tối mặc định
        backEl.classList.add('is-dark');
        labelEl.classList.add('is-dark');
      }
    };
    img.onerror = () => {
      backEl.classList.add('is-dark');
      labelEl.classList.add('is-dark');
    };
    img.src = src;
  }

  // Quay lại trang trước nếu có lịch sử (giữ nguyên vị trí cuộn),
  // nếu không có lịch sử (mở link trực tiếp, tab mới...) thì dùng href = fromPage ở trên.
  backBtnEl.addEventListener('click', (e) => {
    if(window.history.length > 1){
      e.preventDefault();
      history.back();
    }
  });

  // ---------- Hiệu ứng nghiêng / xoay / hologram ----------
  const stage = document.getElementById('stage');
  const cardInner = document.getElementById('cardInner');
  const holoSheen = document.getElementById('holoSheen');
  const holoGlare = document.getElementById('holoGlare');
  const holoEdge = document.getElementById('holoEdge');
  const cardShadowEl = document.querySelector('.card-shadow');

  let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;
  let targetPX = 50, targetPY = 50, curPX = 50, curPY = 50;
  let targetGlow = 0, curGlow = 0;
  let targetScale = 1, curScale = 1;
  let pointerActive = false;
  let idleT = Math.random() * 10;

  function onPointerMove(e){
    const rect = cardInner.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = (e.clientX - cx) / (rect.width / 2);
    let dy = (e.clientY - cy) / (rect.height / 2);
    dx = Math.max(-1, Math.min(1, dx));
    dy = Math.max(-1, Math.min(1, dy));
    targetRY = dx * 20;
    targetRX = dy * -16; // di chuột lên -> mép trên ngả ra xa (nghiêng thật theo cả 2 trục)
    targetPX = 50 + dx * 42;
    targetPY = 50 + dy * 42;
    targetGlow = 0.6;
    targetScale = 1.045;
    pointerActive = true;
  }
  function onPointerLeave(){
    pointerActive = false;
    targetGlow = 0;
    targetScale = 1;
  }

  stage.addEventListener('pointermove', onPointerMove);
  stage.addEventListener('pointerleave', onPointerLeave);
  stage.addEventListener('pointercancel', onPointerLeave);
  stage.addEventListener('pointerdown', onPointerMove);

  function loop(){
    if(!pointerActive){
      idleT += 0.008;
      targetRY = Math.sin(idleT) * 9;
      targetRX = Math.cos(idleT * 0.7) * 4;
      targetPX = 50 + Math.sin(idleT) * 20;
      targetPY = 50 + Math.cos(idleT * 0.8) * 20;
      targetGlow = 0.22 + Math.sin(idleT * 1.3) * 0.1;
      targetScale = 1;
    }

    curRX += (targetRX - curRX) * 0.09;
    curRY += (targetRY - curRY) * 0.09;
    curPX += (targetPX - curPX) * 0.08;
    curPY += (targetPY - curPY) * 0.08;
    curGlow += (targetGlow - curGlow) * 0.08;
    curScale += (targetScale - curScale) * 0.08;

    cardInner.style.transform = `scale(${curScale}) rotateX(${curRX}deg) rotateY(${curRY}deg)`;
    cardShadowEl.style.transform = `translateZ(-40px) translateX(${curRY * -1.6}px) translateY(${curRX * 1.2}px) scale(${1 - Math.abs(curRY) * 0.006}, ${1 - Math.abs(curRX) * 0.006})`;
    holoSheen.style.backgroundPosition = `${curPX}% ${curPY}%`;
    holoGlare.style.setProperty('--gx', curPX + '%');
    holoGlare.style.setProperty('--gy', curPY + '%');
    holoGlare.style.opacity = curGlow;
    holoEdge.style.setProperty('--edge-op', Math.min(1, curGlow * 1.4));

    requestAnimationFrame(loop);
  }
  loop();
</script>

</body>
</html>
