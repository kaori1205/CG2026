<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Xem Thẻ · Công Diễn Hội Ngộ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0a0503;
    --ember:#e8380d;
    --flame:#ff8a1e;
    --gold:#f4d35e;
    --steel:#d7dbe0;
    --iron:#1a1512;
    --text-light:#f2ece0;
    --text-muted:#a99b8c;
    --card-w: clamp(220px, 58vw, 400px);
    --card-ratio: 1635 / 2048;
    --radius: 4mm;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    height:100%;
    overflow:hidden;
    background:var(--void);
    font-family:'Source Sans 3', sans-serif;
    color:var(--text-light);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* ---------- Nền mờ từ chính ảnh thẻ ---------- */
  .bg-crop{
    position:fixed; inset:0;
    overflow:hidden;
    z-index:-2;
  }
  .bg-img{
    position:absolute;
    inset:-60px;
    background-size:cover;
    background-position:center;
    filter: blur(55px) saturate(1.25) brightness(0.55);
    transform: scale(1.12);
  }
  .bg-overlay{
    position:fixed; inset:0;
    z-index:-1;
    background:
      radial-gradient(ellipse 900px 700px at 50% 0%, rgba(232,56,13,0.32), transparent 62%),
      radial-gradient(ellipse 1000px 900px at 100% 100%, rgba(0,0,0,0.5), transparent 60%),
      linear-gradient(180deg, rgba(10,5,3,0.55) 0%, rgba(5,2,1,0.82) 60%, rgba(5,2,1,0.95) 100%);
  }

  /* ---------- Top bar ---------- */
  .top-bar{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding: max(16px, env(safe-area-inset-top)) 20px 16px;
    z-index:10;
  }
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(10,5,3,0.4);
    backdrop-filter: blur(6px);
    border:1px solid rgba(244,211,94,0.4);
    color:var(--gold);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:9px 16px;
    border-radius:30px;
    cursor:pointer;
    text-decoration:none;
    transition: all 0.25s ease;
  }
  .back-btn:hover{
    background: rgba(232,56,13,0.18);
    border-color: var(--flame);
    color: var(--flame);
  }
  .label{
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    line-height:1.5;
  }
  .label .num{
    display:inline-block;
    font-family:'Anton', sans-serif;
    color:var(--void);
    background: linear-gradient(135deg, var(--gold), var(--flame));
    padding:3px 9px;
    border-radius:3px;
    margin-right:6px;
    letter-spacing:0.05em;
  }
  .label .title{
    display:block;
    margin-top:6px;
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:15px;
    color:var(--text-light);
    letter-spacing:0.02em;
    text-transform:uppercase;
  }

  /* ---------- Stage / card ---------- */
  .stage{
    position:fixed; inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective: 1600px;
    touch-action:none;
  }

  .card-wrap{
    width:var(--card-w);
    aspect-ratio: var(--card-ratio);
    animation: introDrop 0.9s cubic-bezier(.2,.9,.25,1) both;
    filter: drop-shadow(0 30px 45px rgba(0,0,0,0.6));
  }
  @keyframes introDrop{
    from{ opacity:0; transform: translateY(-42px) scale(0.86); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .card-inner{
    position:relative;
    width:100%; height:100%;
    transform-style:preserve-3d;
    will-change:transform;
  }

  .card-shadow{
    position:absolute;
    left:6%; right:6%;
    bottom:-9%;
    height:16%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6), transparent 72%);
    filter: blur(16px);
    transform: translateZ(-40px);
    pointer-events:none;
  }

  .card-face{
    position:relative;
    width:100%; height:100%;
    border-radius: var(--radius);
    overflow:hidden;
    background: var(--iron);
    padding:4px;
    box-shadow:
      0 0 0 1.5px rgba(244,211,94,0.55),
      0 0 40px rgba(232,56,13,0.4),
      0 20px 40px -14px rgba(0,0,0,0.8);
    background-image:
      linear-gradient(135deg, #f4ecd6 0%, #c9ccd0 18%, #8a8f96 32%, #f4ecd6 48%, #b8862f 60%, #8a8f96 78%, #d7dbe0 100%);
  }
  .card-art{
    width:100%; height:100%;
    border-radius: calc(var(--radius) - 2px);
    overflow:hidden;
    position:relative;
    background: var(--iron);
  }
  .card-art .art{
    position:absolute; inset:0;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
  }

  /* ---------- Hologram overlays ---------- */
  .holo-sheen{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    background: repeating-linear-gradient(115deg,
      rgba(255,46,151,0.55) 0%,
      rgba(255,196,0,0.55) 9%,
      rgba(84,255,196,0.55) 18%,
      rgba(63,150,255,0.55) 27%,
      rgba(198,63,255,0.55) 36%,
      rgba(255,46,151,0.55) 45%);
    background-size:260% 260%;
    mix-blend-mode: color-dodge;
    opacity:0.4;
    pointer-events:none;
  }
  .holo-glare{
    position:absolute; inset:4px;
    border-radius: calc(var(--radius) - 1px);
    background: radial-gradient(circle at var(--gx,50%) var(--gy,50%), rgba(255,255,255,0.95), transparent 55%);
    mix-blend-mode: overlay;
    opacity:0;
    pointer-events:none;
  }
  .holo-edge{
    position:absolute; inset:0;
    border-radius: var(--radius);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.35);
    opacity: var(--edge-op, 0);
    pointer-events:none;
    mix-blend-mode:overlay;
  }

  .hint{
    position:fixed;
    left:0; right:0;
    bottom: max(22px, env(safe-area-inset-bottom));
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--text-muted);
    z-index:5;
    animation: hintFade 5s ease forwards;
    pointer-events:none;
  }
  @keyframes hintFade{
    0%{opacity:0;} 15%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;}
  }

  @media (max-width:560px){
    .label{ display:none; }
  }
</style>
</head>
<body>

  <div class="bg-crop"><div class="bg-img" id="bgImg"></div></div>
  <div class="bg-overlay"></div>

  <div class="top-bar">
    <a class="back-btn" id="backBtn" href="cong-dien-hoi-ngo.html">← Quay lại bộ sưu tập</a>
    <div class="label" id="labelBox" style="display:none;">
      <span class="num" id="labelNum"></span>
      <span class="title" id="labelTitle"></span>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="card-wrap">
      <div class="card-inner" id="cardInner">
        <div class="card-shadow"></div>
        <div class="card-face">
          <div class="card-art"><div class="art" id="cardArt"></div></div>
        </div>
        <div class="holo-sheen" id="holoSheen"></div>
        <div class="holo-glare" id="holoGlare"></div>
        <div class="holo-edge" id="holoEdge"></div>
      </div>
    </div>
  </div>

  <div class="hint">Di chuột hoặc chạm để xoay thẻ</div>

<script>
  const params = new URLSearchParams(location.search);
  const imgSrc = params.get('img');
  const title  = params.get('title');
  // 'from' = tên file trang danh sách đã mở thẻ này (VD: cong-dien-3.html).
  // Dùng để nút "Quay lại" luôn trỏ đúng trang gốc, kể cả khi không có lịch sử trình duyệt.
  const fromPage = params.get('from') || 'cong-dien-hoi-ngo.html';

  const backBtnEl = document.getElementById('backBtn');
  backBtnEl.href = fromPage;

  if(!imgSrc){
    location.href = fromPage;
  } else {
    document.getElementById('bgImg').style.backgroundImage = `url('${imgSrc}')`;
    document.getElementById('cardArt').style.backgroundImage = `url('${imgSrc}')`;

    if(title){
      const box = document.getElementById('labelBox');
      box.style.display = '';
      document.getElementById('labelTitle').textContent = title;
    }
  }

  // Quay lại trang trước nếu có lịch sử (giữ nguyên vị trí cuộn),
  // nếu không có lịch sử (mở link trực tiếp, tab mới...) thì dùng href = fromPage ở trên.
  backBtnEl.addEventListener('click', (e) => {
    if(window.history.length > 1){
      e.preventDefault();
      history.back();
    }
  });

  // ---------- Hiệu ứng nghiêng / xoay / hologram ----------
  const stage = document.getElementById('stage');
  const cardInner = document.getElementById('cardInner');
  const holoSheen = document.getElementById('holoSheen');
  const holoGlare = document.getElementById('holoGlare');
  const holoEdge = document.getElementById('holoEdge');

  let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;
  let targetPX = 50, targetPY = 50, curPX = 50, curPY = 50;
  let targetGlow = 0, curGlow = 0;
  let pointerActive = false;
  let idleT = Math.random() * 10;

  function onPointerMove(e){
    const rect = cardInner.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = (e.clientX - cx) / (rect.width / 2);
    let dy = (e.clientY - cy) / (rect.height / 2);
    dx = Math.max(-1, Math.min(1, dx));
    dy = Math.max(-1, Math.min(1, dy));
    targetRY = dx * 18;
    targetRX = -dy * 18;
    targetPX = 50 + dx * 42;
    targetPY = 50 + dy * 42;
    targetGlow = 0.6;
    pointerActive = true;
  }
  function onPointerLeave(){
    pointerActive = false;
    targetGlow = 0;
  }

  stage.addEventListener('pointermove', onPointerMove);
  stage.addEventListener('pointerleave', onPointerLeave);
  stage.addEventListener('pointercancel', onPointerLeave);
  stage.addEventListener('pointerdown', onPointerMove);

  function loop(){
    if(!pointerActive){
      idleT += 0.008;
      targetRY = Math.sin(idleT) * 7;
      targetRX = Math.cos(idleT * 0.8) * 4.5;
      targetPX = 50 + Math.sin(idleT) * 20;
      targetPY = 50 + Math.cos(idleT * 0.8) * 20;
      targetGlow = 0.22 + Math.sin(idleT * 1.3) * 0.1;
    }

    curRX += (targetRX - curRX) * 0.08;
    curRY += (targetRY - curRY) * 0.08;
    curPX += (targetPX - curPX) * 0.08;
    curPY += (targetPY - curPY) * 0.08;
    curGlow += (targetGlow - curGlow) * 0.08;

    cardInner.style.transform = `rotateX(${curRX}deg) rotateY(${curRY}deg)`;
    holoSheen.style.backgroundPosition = `${curPX}% ${curPY}%`;
    holoGlare.style.setProperty('--gx', curPX + '%');
    holoGlare.style.setProperty('--gy', curPY + '%');
    holoGlare.style.opacity = curGlow;
    holoEdge.style.setProperty('--edge-op', Math.min(1, curGlow * 1.4));

    requestAnimationFrame(loop);
  }
  loop();
</script>

</body>
</html>
